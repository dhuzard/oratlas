name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DATABASE_URL: "file:${{ github.workspace }}/packages/db/prisma/release.db"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require the tagged commit on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes and validate the tag
        run: pnpm --silent release:notes -- --tag "$GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"

      - name: Verify release source
        run: |
          pnpm --filter @oratlas/db db:generate
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm --filter @oratlas/db db:push
          pnpm --filter @oratlas/db db:seed
          pnpm --filter @oratlas/web build
        env:
          SESSION_SECRET: release-build-secret

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ github.token }}
