name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep every Prisma command on one absolute, job-local SQLite database.
  DATABASE_URL: "file:${{ github.workspace }}/packages/db/prisma/ci.db"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @oratlas/db db:generate

      - name: Validate Prisma schema
        run: pnpm --filter @oratlas/db db:validate

      - name: Validate JSON Schemas
        run: pnpm schema:check

      - name: OpenAPI contract drift check
        run: pnpm openapi:check

      - name: PostgreSQL schema/DDL drift check
        run: |
          pnpm --filter @oratlas/db db:pg:schema
          pnpm --filter @oratlas/db db:pg:ddl
          git diff --exit-code -- \
            packages/db/prisma/schema.postgres.prisma \
            packages/db/prisma/schema.postgres.sql

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & integration tests
        run: pnpm test

      - name: Set up database (push + seed)
        run: pnpm --filter @oratlas/db db:push && pnpm --filter @oratlas/db db:seed

      - name: Production build
        run: pnpm --filter @oratlas/web build
        env:
          SESSION_SECRET: ci-build-secret

  postgres:
    # Proves the schema is portable: push + seed the generated PostgreSQL schema
    # against a real Postgres service on every PR ("tested migrations").
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oratlas
          POSTGRES_PASSWORD: oratlas
          POSTGRES_DB: oratlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oratlas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://oratlas:oratlas@localhost:5432/oratlas"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate PostgreSQL schema
        run: pnpm --filter @oratlas/db db:pg:schema

      - name: Generate Prisma client (postgres)
        working-directory: packages/db
        run: pnpm exec prisma generate --schema prisma/schema.postgres.prisma

      - name: Push schema to PostgreSQL
        working-directory: packages/db
        run: pnpm exec prisma db push --schema prisma/schema.postgres.prisma --skip-generate

      - name: Seed PostgreSQL
        run: pnpm --filter @oratlas/db db:seed

      - name: Exercise federation persistence and race handling on PostgreSQL
        run: pnpm exec vitest run apps/web/src/lib/federation.integration.test.ts
        env:
          FEDERATION_TEST_DATABASE_URL: "postgresql://oratlas:oratlas@localhost:5432/oratlas"

      - name: Exercise Execution Passport persistence on PostgreSQL
        run: pnpm exec vitest run apps/web/src/lib/execution-passports.integration.test.ts
        env:
          EXECUTION_PASSPORT_TEST_DATABASE_URL: "postgresql://oratlas:oratlas@localhost:5432/oratlas"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @oratlas/db db:generate

      - name: Set up database (push + seed)
        run: pnpm --filter @oratlas/db db:push && pnpm --filter @oratlas/db db:seed

      - name: Install Playwright browser
        run: pnpm --filter @oratlas/web exec playwright install --with-deps chromium

      - name: Essential Playwright tests (incl. axe accessibility)
        run: pnpm --filter @oratlas/web test:e2e
        env:
          PLAYWRIGHT_CHROMIUM: ""
