name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep every Prisma command on one absolute, job-local SQLite database.
  DATABASE_URL: "file:${{ github.workspace }}/packages/db/prisma/ci.db"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @oratlas/db db:generate

      - name: Validate Prisma schema
        run: pnpm --filter @oratlas/db db:validate

      - name: Validate JSON Schemas
        run: pnpm schema:check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & integration tests
        run: pnpm test

      - name: Set up database (push + seed)
        run: pnpm --filter @oratlas/db db:push && pnpm --filter @oratlas/db db:seed

      - name: Production build
        run: pnpm --filter @oratlas/web build
        env:
          SESSION_SECRET: ci-build-secret

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @oratlas/db db:generate

      - name: Set up database (push + seed)
        run: pnpm --filter @oratlas/db db:push && pnpm --filter @oratlas/db db:seed

      - name: Install Playwright browser
        run: pnpm --filter @oratlas/web exec playwright install --with-deps chromium

      - name: Essential Playwright tests
        run: pnpm --filter @oratlas/web test:e2e
        env:
          PLAYWRIGHT_CHROMIUM: ""
