        title: { type: string, minLength: 1, maxLength: 300 }
        abstract: { type: string, minLength: 1, maxLength: 2000 }
        document: { $ref: "#/components/schemas/SynthesisReviewDocument" }
        provenance: { $ref: "#/components/schemas/AcceptedSynthesisProvenance" }
        citations:
          type: array
          items: { $ref: "#/components/schemas/PublicSynthesisCitation" }
        version: { $ref: "#/components/schemas/PublicSynthesisVersion" }
        freshness: { $ref: "#/components/schemas/SynthesisFreshness" }
paths:
  /api/health:
    get:
      summary: Liveness check
      description: Dependency-free liveness probe; always returns quickly when the process is up.
      responses:
        "200": { description: OK }
  /api/health/ready:
    get:
      summary: Readiness check
      description: >
        Readiness probe for load balancers. Performs a trivial database round-trip and returns 503
        when a dependency is unavailable. No error detail is leaked in the body.
      responses:
        "200": { description: Ready }
        "503": { description: Unavailable }
  /api/inspect:
    post:
      summary: Capture an explicitly selected immutable repository source
      description: >
        Sign-in, exact same-origin JSON, and an explicit default-branch/tag/release selection are
        required. Returns an expiring, single-use capability bound to the user and exact canonical
        capture bytes. A release is classified through GitHub's exact release-by-tag endpoint.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InspectRequest" }
      responses:
        "200":
          description: Inspection result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/validate-doi:
    post:
      summary: Validate a DOI and return a structured report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoiValidationRequest" }
      responses:
        "200": { description: Structured DOI validation report }
        "400": { $ref: "#/components/responses/Error" }
  /api/submissions:
    post:
      summary: Consume one exact inspection capture and finalize a submission
      description: >
        Does not re-inspect GitHub. The capability, repository/snapshot, canonical submission,
        capture consumption and audit event are committed atomically.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmissionCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmissionCreateResponse" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/decision:
    post:
      summary: Transactional, idempotent editorial decision (editor role required)
      description: >
        Acceptance uses a compare-and-set terminal transition. Review/version/evidence rows,
        check-scoped exceptions and idempotent audit events commit together. Every failed
        consistency check requires its own override rationale.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EditorialDecisionRequest" }
      responses:
        "200": { description: Decision recorded }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/trust:
    post:
      summary: Record a hash-bound Atlas structural review of an imported TRUST assessment
      description: >
        Editor role, an exact same-origin Origin header, same-origin Fetch Metadata when present,
        and application/json are required. The expected hash and revision provide optimistic
        concurrency; a mismatch returns 409. This records provenance/structure review, not
        scientific correctness.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrustVerificationRequest" }
      responses:
        "200": { description: Verification marker recorded }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/lifecycle:
    post:
      summary: Append a version-bound correction, withdrawal or tombstone
      description: >
        Editor role, exact same-origin application/json, and expected review lifecycle revision
        are required. Target and superseded versions must belong to the same review and carry
        exact non-zero commits. State guard, event and audit commit atomically.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewLifecycleRequest" }
      responses:
        "201": { description: Append-only lifecycle event recorded }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/search:
    get:
      summary: Search accepted reviews and knowledge nodes with one combined pagination window
      description: Knowledge-node candidates are deterministically capped at 2,000 in this POC.
      parameters:
        - {
            name: contentType,
            in: query,
            schema: { type: string, enum: [all, review, node], default: all },
          }
        - {
            name: nodeKind,
            in: query,
            schema: { type: string, enum: [claim, figure, dataset, code] },
          }
        - { name: q, in: query, schema: { type: string } }
        - { name: domain, in: query, schema: { type: string } }
        - { name: author, in: query, schema: { type: string } }
        - { name: hasDoi, in: query, schema: { type: boolean } }
        - { name: hasTrustData, in: query, schema: { type: boolean } }
        - {
            name: sort,
            in: query,
            schema: { type: string, enum: [accepted, updated, title, relevance] },
          }
      responses:
        "200": { description: Search results }
  /api/graph:
    get:
      summary: Query a bounded public knowledge subgraph by seed node or topic
      description: >
        Traverses canonical directed edges in both directions, so contradictions appear from
        either endpoint without duplicating or reversing their edge identity. Confirmed edges are
        the default. The proposed view is privacy-minimal and never exposes rejected/superseded
        proposals, raw evidence, agent runs, reviewer identity, review notes or audit data.
      parameters:
        - { name: seed, in: query, schema: { type: string, maxLength: 200 } }
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - { name: depth, in: query, schema: { type: integer, minimum: 0, maximum: 3, default: 1 } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 25 },
          }
        - { name: cursor, in: query, schema: { type: string, maxLength: 768 } }
        - { name: kind, in: query, schema: { type: string, enum: [claim, figure, dataset, code] } }
        - name: relationType
          in: query
          schema:
            {
              type: string,
              enum:
                [supports, contradicts, replicates, extends, uses-dataset, uses-code, derives-from],
            }
        - {
            name: edgeStatus,
            in: query,
            schema: { type: string, enum: [confirmed, proposed], default: confirmed },
          }
        - name: hasTrust
          in: query
          description: Filter edges by presence of an exact relation-scoped TRUST assessment
          schema: { type: boolean }
      responses:
        "200":
          description: One cursor page of exact-version graph nodes and edges
          headers:
            RateLimit-Limit: { schema: { type: integer }, description: Configured request budget }
            RateLimit-Remaining: { schema: { type: integer }, description: Requests remaining }
            RateLimit-Reset:
              { schema: { type: integer }, description: Fixed-window reset as Unix epoch seconds }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicGraphResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "429":
          description: Structured rate-limit error
          headers:
            Retry-After: { schema: { type: integer }, description: Seconds until retry }
            RateLimit-Limit: { schema: { type: integer }, description: Configured request budget }
            RateLimit-Remaining: { schema: { type: integer }, description: Always zero }
            RateLimit-Reset:
              { schema: { type: integer }, description: Fixed-window reset as Unix epoch seconds }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/nodes:
    get:
      summary: List accepted knowledge nodes
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - { name: kind, in: query, schema: { type: string, enum: [claim, figure, dataset, code] } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            name: pageSize,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
      responses:
        "200":
          description: Paginated node summaries from a deterministic POC scan capped at 2,000 nodes
          content:
            application/json:
              schema:
                type: object
                required: [total, page, pageSize, items]
                properties:
                  total: { type: integer, minimum: 0 }
                  page: { type: integer, minimum: 1 }
                  pageSize: { type: integer, minimum: 1 }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PublicNodeSummary" }
        "400": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}:
    get:
      summary: Retrieve the current immutable version and public graph context for a stable node
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Current node detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicNodeDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}/versions:
    get:
      summary: List immutable versions of a stable knowledge node
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The newest 200 immutable versions; exact older-version URLs remain readable
          content:
            application/json:
              schema:
                type: object
                required: [nodeId, currentVersionId, items]
                properties:
                  nodeId: { type: string }
                  currentVersionId: { type: string }
                  items:
                    type: array
                    maxItems: 200
                    items: { $ref: "#/components/schemas/PublicNodeVersionSummary" }
        "404": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}/versions/{versionId}:
    get:
      summary: Retrieve one exact immutable knowledge-node version
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Historical node detail; graph context is separately labelled and may evolve
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicNodeDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}:
    get:
      summary: Retrieve a review by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Review detail }
        "404": { $ref: "#/components/responses/Error" }
  /api/claims:
    get:
      summary: Search claims across reviews
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: reviewSlug, in: query, schema: { type: string } }
        - { name: relationType, in: query, schema: { type: string } }
      responses:
        "200": { description: Claim results }
  /api/reviews/{slug}/versions/{versionId}:
    get:
      summary: Retrieve one immutable review version and its exact snapshot/evidence
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Version-scoped review detail }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/diff:
    get:
      summary: Deterministic canonical diff of two readable archived versions
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: from, in: query, required: true, schema: { type: string } }
        - { name: to, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Checksummed changes across assets, metadata, claims and citations
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/comments:
    get:
      summary: List read-only comments bound to one immutable review version
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Version-scoped threaded comment list }
        "404": { $ref: "#/components/responses/Error" }
  /api/discuss:
    post:
      summary: Grounded cross-review discussion (deterministic or LLM mode)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscussRequest" }
      responses:
        "200": { description: Discussion response }
        "400": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/comments:
    get:
      summary: List human community comments on a review (threaded one level deep)
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Threaded comment list }
        "404": { $ref: "#/components/responses/Error" }
    post:
      summary: Post a community comment or reply on a review (sign-in required)
      security: [{ session: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentCreateRequest" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/comments/{id}:
    delete:
      summary: Remove a comment (its author or an editor); soft delete
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Removed }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/export/{format}:
    get:
      summary: Standards export of one immutable version (archive-only, no upstream access)
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [csl, bibtex, ris, jats, ro-crate, prov, package, docmap]
      responses:
        "200":
          description: >
            Export document. csl → CSL-JSON, bibtex → BibTeX, ris → RIS,
            jats → JATS XML front matter, ro-crate → RO-Crate 1.1 JSON-LD,
            prov → W3C PROV JSON-LD, package → preservation manifest with
            file checksums, SWHIDs and integrity hashes. Example identifiers
            (10.5555/…) are withheld from machine-actionable fields.
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/files/{path}:
    get:
      summary: Preserved raw file content from the durable accepted database snapshot
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
        - { name: path, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: >
            Plain-text attachment (nosniff). Repository content is untrusted
            and is never served as renderable HTML.
        "404": { $ref: "#/components/responses/Error" }
  /api/feeds/atom:
    get:
      summary: Atom feed of recently accepted review versions
      responses:
        "200": { description: Atom 1.0 document }
  /api/feeds/lifecycle:
    get:
      summary: Machine-readable correction, withdrawal and tombstone ledger
      responses:
        "200":
          description: >
            Public event metadata including review/version ids, exact commit, reason, actor,
            timestamp, CAS revision and optional superseded-version link. No tombstoned
            scholarly payload is included.
  /api/editorial/assignments:
    post:
      summary: Assign an editor to a submission with an explicit conflict-of-interest declaration
      security: [{ session: [] }]
      responses:
        "200": { description: Assignment created (declared conflicts record a recusal) }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /api/editorial/assignments/{id}/recuse:
    post:
      summary: Recuse an active assignment (the assigned editor or an admin)
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Recused }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /api/editorial/rounds:
    post:
      summary: Open the next formal review round (actively assigned editor only)
      security: [{ session: [] }]
      responses:
        "200": { description: Round opened }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /api/editorial/rounds/{id}/reports:
    post:
      summary: Submit an immutable, attributable formal review report (one per reviewer per round)
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Report recorded with SHA-256 body hash }
        "409": { $ref: "#/components/responses/Error" }
  /api/editorial/rounds/{id}/responses:
    post:
      summary: Submit an author response within an open round (submitter only)
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Response recorded }
        "403": { $ref: "#/components/responses/Error" }
  /api/editorial/rounds/{id}/decision:
    post:
      summary: Close a round with a decision letter and apply the archive decision
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Decision issued; acceptance publishes atomically }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /api/editorial/process:
    get:
      summary: Public immutable editorial process history across resubmission lineage
      parameters:
        - { name: submissionId, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Rounds, reports, responses and decision letters }
        "404": { $ref: "#/components/responses/Error" }
  /api/notifications:
    get:
      summary: List the signed-in user's editorial notifications
      security: [{ session: [] }]
      responses:
        "200": { description: Notification list }
        "401": { $ref: "#/components/responses/Error" }
    post:
      summary: Mark one notification as read
      security: [{ session: [] }]
      responses:
        "200": { description: Marked read }
        "404": { $ref: "#/components/responses/Error" }
  /api/profile/orcid:
    post:
      summary: Attach or clear the signed-in user's ORCID iD (stored unverified)
      security: [{ session: [] }]
      responses:
        "200": { description: ORCID stored, verification pending an ORCID sign-in flow }
  /api/claims/{versionId}/{localClaimId}:
    get:
      summary: Stable machine-readable claim passport (identity, evidence selectors, lineage, alerts)
      parameters:
        - { name: versionId, in: path, required: true, schema: { type: string } }
        - { name: localClaimId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Claim passport }
        "404": { $ref: "#/components/responses/Error" }
  /api/execution-passports/{id}:
    get:
      summary: Export one offline-verified Execution Passport
      description: >
        Returns an archive-only Workflow Run crate, signed envelope, exact claim/artifact bindings,
        and verification summary. execution-attested does not mean reproduced or scientifically true.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Verified execution passport
          content:
            application/vnd.oratlas.execution-passport.v1+json:
              schema: { type: object }
        "404": { $ref: "#/components/responses/Error" }
  /api/editorial/execution-passports:
    post:
      summary: Verify and register a signed execution package (editor only)
      description: Offline-only; submitted code is never cloned or executed.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecutionPassportRegistration" }
      responses:
        "200": { description: Registered with status execution-attested }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/execution-passports/{id}/verify:
    post:
      summary: Re-verify a stored execution package against the current offline trust policy
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedRevision]
              properties:
                expectedRevision: { type: integer, minimum: 0 }
      responses:
        "200": { description: Verification revision recorded }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/update-proposals:
    get:
      summary: Living-review surface; upstream CI can gate on openCount === 0
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Open and resolved claim-update proposals for the review }
        "404": { $ref: "#/components/responses/Error" }
  /api/monitoring/citation-status:
    post:
      summary: Register a cited-work status signal (retracted/corrected/concern/new-evidence)
      security: [{ session: [] }]
      responses:
        "200": { description: Signal recorded; one proposal opened per affected claim }
        "403": { $ref: "#/components/responses/Error" }
  /api/monitoring/proposals/{id}/resolve:
    post:
      summary: Resolve an open claim-update proposal with an attributable note
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Resolved }
        "409": { $ref: "#/components/responses/Error" }
  /api/protocols/snapshots:
    post:
      summary: Register an exact OSF or ClinicalTrials.gov protocol snapshot and open neutral proposals
      description: >
        Editor-only, same-origin, rate- and body-limited ingestion. The same target/source version
        with different content is rejected; an exact retry is idempotent. No registry network request
        occurs in this endpoint.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProtocolSnapshotRequest" }
      responses:
        "200": { description: Immutable snapshot and deterministic proposal counts }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/protocols/proposals/{id}/resolve:
    post:
      summary: Resolve one neutral protocol reconciliation proposal with attribution
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProtocolProposalResolution" }
      responses:
        "200": { description: Proposal resolved exactly once }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/node-edge-proposals/{id}/decision:
    post:
      summary: Confirm, reject, or supersede an attributable node-edge proposal
      description: >
        Current editor/admin role, same-origin JSON, rate and body limits, and an expected
        revision are required. Only confirmation materializes an authoritative NodeEdge.
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeEdgeDecision" }
      responses:
        "200": { description: CAS decision result; exact retries are idempotent }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/syntheses/generate:
    post:
      summary: Generate one private immutable grounded-synthesis draft
      description: >
        Claims a caller request key before provider execution, binds it to one canonical selector,
        snapshots the exact bounded evidence packet and successful AgentRun, and creates no public review.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SynthesisGenerationRequest" }
      responses:
        "200":
          description: Private editorial synthesis draft
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorialSynthesisDraft" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/syntheses/{id}/decision:
    post:
      summary: Accept, reject, or request regeneration of a private synthesis draft
      description: >
        Rechecks the editor role, binds the idempotency key to the canonical decision body, and
        uses serializable CAS. Only acceptance materializes and advances the public synthesis head.
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SynthesisDecision" }
      responses:
        "200":
          description: Idempotent editorial decision result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SynthesisDecisionResult" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/syntheses/staleness/scan:
    post:
      summary: Evaluate accepted synthesis heads and create private regeneration proposals
      description: >
        Bounded deterministic scan of each exact accepted selector and packet. It records immutable
        evaluations and deduplicated private proposals but never calls a provider, creates a draft,
        or publishes a review.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        "200":
          description: Bounded allowlisted scan results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SynthesisStalenessScanResult" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/syntheses/staleness/{id}/decision:
    post:
      summary: Request private regeneration or dismiss one current proposal
      description: Rechecks the accepted head and editor role and applies idempotent revision CAS. No generation occurs.
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SynthesisRegenerationProposalDecision" }
      responses:
        "200":
          description: Idempotent proposal decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SynthesisRegenerationProposalDecisionResult" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/syntheses/{slug}:
    get:
      summary: Read the current editor-accepted AI synthesis from its authoritative head
      description: >
        Returns an allowlisted public DTO only after revalidating the linked immutable draft,
        AgentRun, canonical hashes, citations, attribution, rights, and predecessor lineage.
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Current accepted synthesis without private packet or run fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicSynthesisReview" }
        "404": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}/edges:
    get:
      summary: Minimal public confirmed-edge projection for one knowledge node
      description: Rejected, superseded, and unconfirmed proposals are excluded; contradictions project symmetrically.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          { description: Bounded list of at most 200 editor-confirmed typed edges; never cached }
  /api/protocols/reviews/{versionId}:
    get:
      summary: Public review-level protocol provenance and neutral reconciliation proposals
      parameters:
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Normalized snapshots, exact versions/timestamps/hashes, and proposal states
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProtocolDriftSummary" }
        "404": { $ref: "#/components/responses/Error" }
  /api/synthesis/contradictions:
    get:
      summary: Cross-review contradiction map with independence-aware classification
      responses:
        "200":
          description: >
            Contradictions between opposing claims that share an evidence
            family, each classified as a genuine contradiction or a scope
            difference, plus review/statement counts.
  /api/replications:
    get:
      summary: List human-published replication briefs
      description: >
        Returns only briefs tied to readable claims. The categorical evidence-gap metadata is
        deterministic editorial triage, not a truth score, outcome prediction, or person ranking.
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, claimed, completed, withdrawn] }
        - name: effortBand
          in: query
          schema: { type: string, enum: [small, medium, large, consortium] }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, maximum: 10000, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: Bounded page of public replication briefs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicationMarketplacePage" }
        "400": { $ref: "#/components/responses/Error" }
    post:
      summary: Register a private replication-brief draft
      description: Editor-only and idempotent. This operation never publishes automatically.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplicationBriefCreateRequest" }
      responses:
        "200":
          description: Draft registered or idempotently replayed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicationBriefMutationResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/replications/{slug}:
    get:
      summary: Get one public replication brief and its attributable lifecycle
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, maxLength: 100 } }
      responses:
        "200":
          description: Published replication brief
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicationBrief" }
        "404": { $ref: "#/components/responses/Error" }
  /api/replications/{slug}/transitions:
    post:
      summary: Apply an authenticated replication-brief lifecycle transition
      description: >
        Publishing and withdrawal require an editor. Claiming requires a signed-in user. Only the
        attributable claimant can record completion. Every transition is audited and CAS-guarded.
      security: [{ session: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, maxLength: 100 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplicationBriefTransitionRequest" }
      responses:
        "200":
          description: Transition committed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicationBriefMutationResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/federation/inbox:
    get:
      summary: List accepted federation notification resource URLs as an LDN container
      description: Returns only editor-accepted inbound notifications with bounded cursor pagination.
      parameters:
        - name: cursor
          in: query
          description: Opaque cursor from the preceding Link rel=next URL.
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: limit
          in: query
          description: Maximum notification URLs to return.
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: JSON-LD LDP container with accepted notification URLs
          headers:
            Link:
              description: Present when another page exists; carries the next cursor with rel=next.
              schema: { type: string }
        "400": { $ref: "#/components/responses/Error" }
    options:
      summary: Advertise accepted LDN notification media types
      responses:
        "204": { description: Allow and Accept-Post headers }
    post:
      summary: Receive a COAR Notify Request Review or Announce Review activity
      description: >
        Public rate-limited JSON-LD inbox. External URLs are preserved as identifiers and are
        never dereferenced. New messages remain pending until an editor resolves them.
      requestBody:
        required: true
        content:
          application/ld+json:
            schema: { type: object }
          application/json:
            schema: { type: object }
      responses:
        "202": { description: Immutable notification persisted privately for editorial triage }
        "200": { description: Idempotent receipt of the same activity and payload }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/federation/notifications/{id}:
    get:
      summary: Read an editor-accepted immutable inbound federation notification as JSON-LD
      description: Pending, rejected, and unknown notification resources all return 404.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Original COAR Notify JSON-LD payload }
        "404": { $ref: "#/components/responses/Error" }
  /api/editorial/federation:
    get:
      summary: List inbound COAR Notify activities for editorial triage
      security: [{ session: [] }]
      responses:
        "200": { description: Federation queue }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/editorial/federation/{id}/resolve:
    post:
      summary: Accept or reject a pending federated review request
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, note]
              properties:
                decision: { type: string, enum: [accepted, rejected] }
                note: { type: string, minLength: 10, maxLength: 4000 }
      responses:
        "200": { description: Attributable editorial resolution }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/federation/announce:
    post:
      summary: Prepare an Announce Review reply to an accepted Request Review
      description: Persists and audits JSON-LD without delivering it or making external requests.
      security: [{ session: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [inReplyTo]
              properties:
                inReplyTo: { type: string, format: uri, maxLength: 2048 }
      responses:
        "200": { description: COAR Notify 1.0.1 Announce Review JSON-LD }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
