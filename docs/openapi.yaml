openapi: 3.1.0
info:
  title: Open Review Atlas API
  version: 0.3.0
  description: >
    External data contracts for the Open Review Atlas POC. Application mutations
    are exposed as conventional JSON API routes. All error responses use the
    structured error envelope and never include internal stack traces.
  license:
    name: MIT
servers:
  - url: http://localhost:3000
    description: Local development
components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: oratlas_session
  responses:
    Error:
      description: Structured error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                [
                  bad-request,
                  unauthorized,
                  forbidden,
                  not-found,
                  conflict,
                  rate-limited,
                  payload-too-large,
                  upstream-error,
                  internal-error,
                ]
            message: { type: string }
            details:
              type: array
              items: { type: string }
    PublicNodeSummary:
      type: object
      additionalProperties: false
      required: [id, localNodeId, kind, title, repository, currentVersionId, updatedAt]
      properties:
        id: { type: string, description: Stable database KnowledgeNode.id used in public URLs }
        localNodeId: { type: string }
        kind: { type: string, enum: [claim, figure, dataset, code] }
        title: { type: string }
        abstract: { type: string }
        repository:
          type: object
          additionalProperties: false
          required: [owner, name, url]
          properties:
            owner: { type: string }
            name: { type: string }
            url: { type: string, format: uri }
        currentVersionId: { type: string }
        updatedAt: { type: string, format: date-time }
    ArchiveRepositoryReviewResult:
      type: object
      additionalProperties: false
      required: [contentType, slug, title, authors, domains, hasDoi, hasTrustData, status, score]
      properties:
        contentType: { const: review }
        slug: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        abstract: { type: string }
        authors: { type: array, items: { type: string } }
        domains: { type: array, items: { type: string } }
        hasDoi: { type: boolean }
        hasTrustData: { type: boolean }
        compatibilityLevel: { type: string }
        status: { type: string }
        score: { type: number }
        sortDate: { type: string, format: date-time }
    ArchiveNodeResult:
      type: object
      additionalProperties: false
      required: [contentType, node, score, sortDate]
      properties:
        contentType: { const: node }
        node: { $ref: "#/components/schemas/PublicNodeSummary" }
        score: { type: number }
        sortDate: { type: string, format: date-time }
    ArchiveSynthesisFreshness:
      type: object
      additionalProperties: false
      required: [status, affectedReferenceCount]
      properties:
        status: { type: string, enum: [unchecked, fresh, stale] }
        affectedReferenceCount: { type: integer, minimum: 0, maximum: 1201 }
      allOf:
        - if: { properties: { status: { const: stale } }, required: [status] }
          then: { properties: { affectedReferenceCount: { minimum: 1 } } }
        - if:
            {
              properties: { status: { type: string, enum: [unchecked, fresh] } },
              required: [status],
            }
          then: { properties: { affectedReferenceCount: { const: 0 } } }
    ArchiveSynthesisResult:
      type: object
      additionalProperties: false
      required: [contentType, slug, title, abstract, version, freshness, score, sortDate]
      properties:
        contentType: { const: synthesis }
        slug: { type: string, minLength: 1, maxLength: 200 }
        title: { type: string, minLength: 1, maxLength: 300 }
        abstract: { type: string, minLength: 1, maxLength: 2000 }
        version: { $ref: "#/components/schemas/PublicSynthesisVersion" }
        freshness: { $ref: "#/components/schemas/ArchiveSynthesisFreshness" }
        score: { type: number }
        sortDate: { type: string, format: date-time }
    ArchiveSynthesisCandidateScan:
      type: object
      additionalProperties: false
      required: [limit, limitReached]
      properties:
        limit:
          const: 500
          description: Maximum accepted-synthesis candidates deeply validated by one request.
        limitReached:
          type: boolean
          description: >
            True when the request evaluated exactly the 500-candidate ceiling. It does not assert
            that a 501st candidate exists; totals then describe only the bounded candidate scan.
    ArchiveSearchResponse:
      type: object
      additionalProperties: false
      required: [total, page, pageSize, synthesisCandidateScan, items]
      properties:
        total:
          type: integer
          minimum: 0
          description: >
            Matching validated records within the bounded POC scans. When
            synthesisCandidateScan.limitReached is true, this is not an asserted global synthesis
            total; pages describe repository reviews, nodes, and the first 500 synthesis candidates.
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 50 }
        synthesisCandidateScan: { $ref: "#/components/schemas/ArchiveSynthesisCandidateScan" }
        items:
          type: array
          items:
            oneOf:
              - { $ref: "#/components/schemas/ArchiveRepositoryReviewResult" }
              - { $ref: "#/components/schemas/ArchiveNodeResult" }
              - { $ref: "#/components/schemas/ArchiveSynthesisResult" }
    PublicRelatedNodeVersion:
      type: object
      additionalProperties: false
      required: [id, localNodeId, kind, title, repository, versionId, versionCreatedAt]
      properties:
        id: { type: string, description: Stable database KnowledgeNode.id used in public URLs }
        localNodeId: { type: string }
        kind: { type: string, enum: [claim, figure, dataset, code] }
        title: { type: string }
        abstract: { type: string }
        repository:
          type: object
          additionalProperties: false
          required: [owner, name, url]
          properties:
            owner: { type: string }
            name: { type: string }
            url: { type: string, format: uri }
        versionId:
          type: string
          description: Exact immutable version bound when the edge was confirmed
        versionCreatedAt: { type: string, format: date-time }
    PublicNodeVersionSummary:
      type: object
      additionalProperties: false
      required: [id, title, commitSha, createdAt, isCurrent]
      properties:
        id: { type: string }
        title: { type: string }
        commitSha: { type: string, pattern: "^(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
        createdAt: { type: string, format: date-time }
        isCurrent: { type: boolean }
    PublicTrustAssessmentProvenance:
      type: object
      additionalProperties: false
      required: [protocolVersion, reviewStatus, verificationState]
      properties:
        assessmentId: { type: string, minLength: 1, maxLength: 200 }
        protocolVersion: { type: string, minLength: 1, maxLength: 120 }
        assessorType: { type: string, minLength: 1, maxLength: 40 }
        assessorId: { type: string, minLength: 1, maxLength: 200 }
        assessedAt: { type: string, format: date-time }
        reviewStatus:
          type: string
          enum: [unverified-import, agent-proposed, human-reviewed, adjudicated, superseded]
        verificationState:
          type: string
          enum: [platform-verified, unverified-import, stale-verification, legacy-unknown]
    PublicNodeDetail:
      type: object
      additionalProperties: false
      required:
        [
          schemaVersion,
          id,
          localNodeId,
          kind,
          repository,
          version,
          versions,
          edges,
          sameClaims,
          trustContext,
        ]
      properties:
        schemaVersion: { const: 1.0.0 }
        id: { type: string }
        localNodeId: { type: string }
        kind: { type: string, enum: [claim, figure, dataset, code] }
        repository:
          type: object
          required: [owner, name, url]
          properties:
            owner: { type: string }
            name: { type: string }
            url: { type: string, format: uri }
        version:
          type: object
          description: >
            Strict kind-specific immutable content. Payload is claim {statement, qualifiers},
            figure {artifactPath, caption, altText}, dataset {artifactPath, format, sizeBytes, doi},
            or code {entryPoints, language, releaseRef}. Identifier entries retain distinct
            version-doi, concept-doi and artifact-doi roles; example identifiers are marked.
          required:
            [
              id,
              snapshotId,
              commitSha,
              kind,
              title,
              contributors,
              license,
              provenance,
              payload,
              identifiers,
              isExample,
              createdAt,
            ]
          properties:
            id: { type: string }
            snapshotId: { type: string }
            commitSha: { type: string, pattern: "^(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
            kind: { type: string, enum: [claim, figure, dataset, code] }
            title: { type: string }
            abstract: { type: string }
            text: { type: string }
            contributors: { type: array, items: { type: object } }
            license: { type: string }
            provenance: { type: object }
            payload: { type: object }
            identifiers:
              type: array
              items:
                type: object
                required: [scheme, role, value, isExample]
                properties:
                  scheme: { const: doi }
                  role: { type: string, enum: [version-doi, concept-doi, artifact-doi] }
                  value: { type: string }
                  isExample: { type: boolean }
            isExample: { type: boolean }
            createdAt: { type: string, format: date-time }
        versions:
          type: array
          items: { $ref: "#/components/schemas/PublicNodeVersionSummary" }
        edges:
          type: array
          description: >
            Editorially confirmed edges only. Outgoing summaries use the immutable target version
            bound at confirmation; inbound projection is limited to symmetric contradictions bound
            to the selected target version.
          items:
            type: object
            required: [id, direction, relationType, provenance, relatedNode]
            properties:
              id: { type: string }
              direction: { type: string, enum: [incoming, outgoing] }
              relationType:
                {
                  type: string,
                  enum:
                    [
                      supports,
                      contradicts,
                      replicates,
                      extends,
                      uses-dataset,
                      uses-code,
                      derives-from,
                    ],
                }
              provenance:
                { type: string, enum: [asserted-by-author, proposed-by-agent, confirmed-by-editor] }
              rationale: { type: string }
              assertedAt: { type: string, format: date-time }
              trust:
                type: object
                additionalProperties: false
                required: [assessmentId, protocolVersion, reviewStatus, verificationState]
                description: >
                  Compact relation-scoped TRUST state. Aggregate scores are intentionally omitted
                  because criterion detail is not expanded in this edge summary.
                properties:
                  assessmentId: { type: string }
                  protocolVersion: { type: string, minLength: 1, maxLength: 40 }
                  reviewStatus:
                    type: string
                    enum:
                      [unverified-import, agent-proposed, human-reviewed, adjudicated, superseded]
                  verificationState:
                    type: string
                    enum: [platform-verified, unverified-import, stale-verification, legacy-unknown]
              trustAssessments:
                type: array
                description: Complete, deterministically ordered relation-scoped assessment set.
                items:
                  allOf:
                    - { $ref: "#/components/schemas/PublicTrustAssessmentProvenance" }
                    - { required: [assessmentId, assessorType] }
              relatedNode: { $ref: "#/components/schemas/PublicRelatedNodeVersion" }
        sameClaims:
          type: array
          description: >
            Editor-confirmed “also asserted in” identities. Stable nodes and relation-scoped
            assessments remain separate; proposed and rejected identities are never public.
          items:
            type: object
            additionalProperties: false
            required: [proposalId, nodeId, localNodeId, title, repository, reviewAssertions]
            properties:
              proposalId: { type: string, pattern: "^nip_[0-9a-f]{64}$" }
              nodeId: { type: string }
              localNodeId: { type: string }
              title: { type: string }
              repository:
                type: object
                required: [owner, name, url]
                properties:
                  owner: { type: string }
                  name: { type: string }
                  url: { type: string, format: uri }
              reviewAssertions:
                type: array
                items:
                  type: object
                  required: [reviewSlug, reviewTitle, versionId, localClaimId]
                  properties:
                    reviewSlug: { type: string }
                    reviewTitle: { type: string }
                    versionId: { type: string }
                    localClaimId: { type: string }
        trustContext:
          type: array
          description: Relation-scoped claim-citation context; never a bare node-level TRUST score.
          items:
            type: object
            additionalProperties: false
            required:
              [
                claimId,
                claimLocalId,
                reviewSlug,
                reviewVersionId,
                citationId,
                citationLocalId,
                citationIsExample,
                relationType,
              ]
            properties:
              claimId: { type: string }
              claimLocalId: { type: string }
              reviewSlug: { type: string }
              reviewVersionId: { type: string }
              citationId: { type: string }
              citationLocalId: { type: string }
              citationTitle: { type: string }
              citationDoi: { type: string }
              citationIsExample: { type: boolean }
              relationType: { type: string }
              trust:
                type: object
                additionalProperties: false
                required: [reviewStatus, verificationState]
                properties:
                  reviewStatus: { type: string }
                  verificationState: { type: string }
                  aggregateScore: { type: number, minimum: 0, maximum: 1 }
                  aggregateMethod: { type: string }
              trustAssessments:
                type: array
                description: Complete, deterministically ordered assessment set with provenance.
                items:
                  type: object
                  additionalProperties: false
                  required:
                    [assessmentId, protocolVersion, assessorType, reviewStatus, verificationState]
                  properties:
                    assessmentId: { type: string }
                    protocolVersion: { type: string, minLength: 1, maxLength: 40 }
                    assessorType: { type: string, minLength: 1, maxLength: 40 }
                    assessorId: { type: string, minLength: 1, maxLength: 200 }
                    assessedAt: { type: string, format: date-time }
                    reviewStatus: { type: string }
                    verificationState: { type: string }
                    aggregateScore: { type: number, minimum: 0, maximum: 1 }
                    aggregateMethod: { type: string }
    PublicGraphNode:
      type: object
      additionalProperties: false
      required:
        [
          id,
          localNodeId,
          kind,
          repository,
          versionId,
          snapshotId,
          commitSha,
          title,
          provenance,
          identifiers,
          createdAt,
        ]
      properties:
        id: { type: string, description: Stable KnowledgeNode identity }
        localNodeId: { type: string }
        kind: { type: string, enum: [claim, figure, dataset, code] }
        repository:
          type: object
          additionalProperties: false
          required: [owner, name, url]
          properties:
            owner: { type: string }
            name: { type: string }
            url: { type: string, format: uri }
        versionId: { type: string, description: Exact immutable version represented in this page }
        snapshotId: { type: string, description: Authoritative immutable repository snapshot }
        commitSha: { type: string, pattern: "^(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
        title: { type: string }
        abstract: { type: string }
        provenance:
          type: object
          additionalProperties: false
          required: [sourcePath]
          properties:
            sourcePath: { type: string }
            sourcePointer: { type: string }
            repositoryUrl: { type: string, format: uri }
            commitSha: { type: string, pattern: "^(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
            declaredAt: { type: string, format: date-time }
        identifiers:
          type: array
          maxItems: 3
          items:
            type: object
            additionalProperties: false
            required: [scheme, role, value, isExample]
            properties:
              scheme: { const: doi }
              role: { type: string, enum: [version-doi, concept-doi, artifact-doi] }
              value: { type: string }
              isExample: { type: boolean }
        createdAt: { type: string, format: date-time }
    PublicGraphTrust:
      $ref: "#/components/schemas/PublicTrustAssessmentProvenance"
    PublicGraphEdge:
      oneOf:
        - type: object
          additionalProperties: false
          required:
            [
              id,
              sourceNodeId,
              sourceVersionId,
              targetNodeId,
              targetVersionId,
              relationType,
              status,
              provenance,
              confirmedAt,
            ]
          properties:
            id: { type: string }
            sourceNodeId: { type: string }
            sourceVersionId: { type: string }
            targetNodeId: { type: string }
            targetVersionId: { type: string }
            relationType:
              {
                type: string,
                enum:
                  [
                    supports,
                    contradicts,
                    replicates,
                    extends,
                    uses-dataset,
                    uses-code,
                    derives-from,
                  ],
              }
            status: { const: confirmed }
            provenance: { const: confirmed-by-editor }
            rationale: { type: string }
            assertedAt: { type: string, format: date-time }
            confirmedAt: { type: string, format: date-time }
            trust: { $ref: "#/components/schemas/PublicGraphTrust" }
            trustAssessments:
              type: array
              description: Complete, deterministically ordered assessment set; never collapsed.
              items: { $ref: "#/components/schemas/PublicGraphTrust" }
        - type: object
          additionalProperties: false
          description: >
            Privacy-minimal public proposal. Evidence JSON, AgentRun data, editor/reviewer identity,
            review notes and audit details are never included. Rejected and superseded proposals
            are never addressable from this API.
          required:
            [
              id,
              sourceNodeId,
              sourceVersionId,
              targetNodeId,
              targetVersionId,
              relationType,
              status,
              provenance,
              proposedAt,
            ]
          properties:
            id: { type: string }
            sourceNodeId: { type: string }
            sourceVersionId: { type: string }
            targetNodeId: { type: string }
            targetVersionId: { type: string }
            relationType:
              {
                type: string,
                enum:
                  [
                    supports,
                    contradicts,
                    replicates,
                    extends,
                    uses-dataset,
                    uses-code,
                    derives-from,
                  ],
              }
            status: { const: proposed }
            provenance: { type: string, enum: [asserted-by-author, proposed-by-agent] }
            rationale: { type: string }
            assertedAt: { type: string, format: date-time }
            proposedAt: { type: string, format: date-time }
    PublicGraphResponse:
      type: object
      additionalProperties: false
      required: [schemaVersion, seedNodeIds, depth, nodes, edges, page]
      properties:
        schemaVersion: { const: 1.0.0 }
        seedNodeIds: { type: array, maxItems: 10, items: { type: string } }
        depth: { type: integer, minimum: 0, maximum: 3 }
        nodes:
          { type: array, maxItems: 110, items: { $ref: "#/components/schemas/PublicGraphNode" } }
        edges:
          { type: array, maxItems: 50, items: { $ref: "#/components/schemas/PublicGraphEdge" } }
        page:
          type: object
          additionalProperties: false
          required: [limit]
          properties:
            limit: { type: integer, minimum: 1, maximum: 50 }
            nextCursor: { type: string, maxLength: 768 }
    ExecutionPassportRegistration:
      type: object
      required: [crate, attestation]
      properties:
        crate:
          type: object
          required: ["@context", "@graph"]
          properties:
            "@context": {}
            "@graph":
              type: array
              minItems: 6
              maxItems: 256
              items: { type: object }
        attestation:
          type: object
          required: [payloadType, payload, signatures]
          properties:
            payloadType:
              const: application/vnd.oratlas.execution-attestation.v1+json
            payload: { type: string, contentEncoding: base64 }
            signatures:
              type: array
              minItems: 1
              maxItems: 4
              items:
                type: object
                required: [keyId, sig]
                properties:
                  keyId: { type: string, pattern: "^[0-9a-f]{64}$" }
                  sig: { type: string, contentEncoding: base64 }
    ProtocolSnapshotRequest:
      type: object
      additionalProperties: false
      required: [reviewVersionId, registry, sourceUrl, sourceVersion, fetchedAt, payload]
      allOf:
        - if:
            properties: { registry: { const: osf } }
            required: [registry]
          then:
            required: [osfQuestions]
          else:
            not: { required: [osfQuestions] }
      properties:
        reviewVersionId: { type: string, minLength: 1, maxLength: 200 }
        claimLocalId: { type: string, minLength: 1, maxLength: 120 }
        registry: { type: string, enum: [osf, clinicaltrials-gov] }
        sourceUrl:
          type: string
          format: uri
          maxLength: 2000
          oneOf:
            - {
                pattern: '^https://(?:www\.)?clinicaltrials\.gov/(?:study|api/v2/studies)/[^/?#]+/?$',
              }
            - { pattern: '^https://osf\.io/[^/?#]+/?$' }
            - { pattern: '^https://api\.osf\.io/v2/registrations/[^/?#]+/?$' }
          description: Clean canonical registry URL without credentials, query, or fragment; payload id must match.
        sourceVersion:
          type: string
          minLength: 1
          maxLength: 300
          description: Exact ETag, registry data version, or immutable source timestamp.
        fetchedAt: { type: string, format: date-time }
        payload:
          description: Exact OSF registration or ClinicalTrials.gov API v2 JSON response.
        osfQuestions:
          type: array
          maxItems: 500
          description: Required only for OSF; exact labels plus explicit non-inferred comparison categories.
          items:
            type: object
            additionalProperties: false
            required: [id, label, category]
            properties:
              id: { type: string, minLength: 1, maxLength: 300 }
              label: { type: string, minLength: 1, maxLength: 2000 }
              category:
                type: string
                enum: [population, outcomes, exclusions, analysis-plan, unclassified]
    ProtocolProposalResolution:
      type: object
      additionalProperties: false
      required: [resolution, note]
      properties:
        resolution:
          type: string
          enum: [confirmed-update-needed, explained, dismissed]
        note: { type: string, minLength: 10, maxLength: 4000 }
    NodeEdgeDecision:
      type: object
      additionalProperties: false
      required: [decision, expectedRevision, note]
      properties:
        decision: { type: string, enum: [confirm, reject, supersede] }
        expectedRevision: { type: integer, minimum: 0 }
        note: { type: string, minLength: 10, maxLength: 4000 }
    NodeIdentityDecision:
      type: object
      additionalProperties: false
      required: [decision, expectedRevision, note]
      properties:
        decision: { type: string, enum: [confirm, reject] }
        expectedRevision: { type: integer, minimum: 0 }
        note: { type: string, minLength: 10, maxLength: 2000 }
    ProtocolEvidence:
      type: object
      additionalProperties: false
      required: [value, sourcePointer]
      properties:
        value: { type: string, minLength: 1, maxLength: 10000 }
        sourcePointer: { type: string, minLength: 1, maxLength: 1000 }
    ProtocolFields:
      type: object
      additionalProperties: false
      required: [population, outcomes, exclusions, analysis-plan]
      properties:
        population:
          { type: array, maxItems: 200, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
        outcomes:
          { type: array, maxItems: 200, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
        exclusions:
          { type: array, maxItems: 200, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
        analysis-plan:
          { type: array, maxItems: 200, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
    NormalizedProtocol:
      type: object
      additionalProperties: false
      required: [schemaVersion, source, title, fields, unclassified]
      properties:
        schemaVersion: { const: 1.0.0 }
        source:
          type: object
          additionalProperties: false
          required: [registry, sourceId, sourceUrl, sourceVersion, capturedAt]
          properties:
            registry: { type: string, enum: [osf, clinicaltrials-gov] }
            sourceId: { type: string }
            sourceUrl: { type: string, format: uri }
            sourceVersion: { type: string }
            registeredAt: { type: string, format: date-time }
            lastUpdatedAt: { type: string, format: date-time }
            capturedAt: { type: string, format: date-time }
        title: { type: string }
        fields: { $ref: "#/components/schemas/ProtocolFields" }
        unclassified:
          type: array
          maxItems: 500
          items: { $ref: "#/components/schemas/ProtocolEvidence" }
    ProtocolProposal:
      type: object
      additionalProperties: false
      required: [id, category, kind, status, rationale, registered, observed, createdAt]
      properties:
        id: { type: string, pattern: "^pdp_[a-f0-9]{64}$" }
        category: { type: string, enum: [population, outcomes, exclusions, analysis-plan] }
        kind: { type: string, enum: [not-described-in-review, not-registered, content-differs] }
        status: { type: string }
        rationale: { type: string }
        registered: { type: array, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
        observed: { type: array, items: { $ref: "#/components/schemas/ProtocolEvidence" } }
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time }
        resolvedByLogin: { type: string }
        resolutionNote: { type: string }
    ProtocolSnapshotSummary:
      type: object
      additionalProperties: false
      required:
        [
          id,
          target,
          registry,
          sourceId,
          sourceUrl,
          sourceVersion,
          fetchedAt,
          contentHash,
          normalized,
          proposals,
          createdAt,
        ]
      properties:
        id: { type: string }
        target: { type: string, enum: [review-version, claim] }
        registry: { type: string, enum: [osf, clinicaltrials-gov] }
        sourceId: { type: string }
        sourceUrl: { type: string, format: uri }
        sourceVersion: { type: string }
        sourceTimestamp: { type: string, format: date-time }
        fetchedAt: { type: string, format: date-time }
        contentHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        normalized: { $ref: "#/components/schemas/NormalizedProtocol" }
        proposals: { type: array, items: { $ref: "#/components/schemas/ProtocolProposal" } }
        createdAt: { type: string, format: date-time }
    ProtocolDriftSummary:
      type: object
      additionalProperties: false
      required: [reviewVersionId, openCount, snapshots]
      properties:
        reviewVersionId: { type: string }
        claimLocalId: { type: string }
        openCount: { type: integer, minimum: 0 }
        snapshots: { type: array, items: { $ref: "#/components/schemas/ProtocolSnapshotSummary" } }
    InspectRequest:
      type: object
      required: [url, source]
      properties:
        url: { type: string, description: Public GitHub repository URL }
        source:
          oneOf:
            - type: object
              required: [kind]
              properties:
                kind: { const: default-branch }
            - type: object
              required: [kind, tag]
              properties:
                kind: { type: string, enum: [tag, release] }
                tag: { type: string, minLength: 1, maxLength: 120 }
    InspectResponse:
      type: object
      properties:
        repo:
          type: object
          properties:
            owner: { type: string }
            name: { type: string }
            canonicalUrl: { type: string }
        inspectionStatus: { type: string, enum: [succeeded, partial, failed] }
        selectedSource:
          type: object
          required: [kind, commitSha, treeSha]
          properties:
            kind: { type: string, enum: [default-branch, tag, release] }
            commitSha: { type: string, pattern: "^(?!0{40}$|0{64}$)(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
            treeSha: { type: string, pattern: "^(?!0{40}$|0{64}$)(?:[0-9a-f]{40}|[0-9a-f]{64})$" }
            branch: { type: string }
            releaseTag: { type: string }
        captureToken:
          type: string
          description: Opaque, user-bound, single-use capability. Expires in 30 minutes.
        captureExpiresAt: { type: string, format: date-time }
        capturePayloadHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        extractedMetadata: { type: object }
        effectiveMetadata: { type: object }
        compatibility: { type: object }
        validation: { type: object }
        knowledgeCounts:
          type: object
          properties:
            claims: { type: integer }
            citations: { type: integer }
            relations: { type: integer }
            trust: { type: integer }
    DoiValidationRequest:
      type: object
      required: [doi]
      properties:
        doi: { type: string }
        repositoryUrl: { type: string }
        title: { type: string }
        releaseTag: { type: string }
        expectedKind: { type: string, enum: [version, concept] }
    SubmissionCreateRequest:
      type: object
      required: [inspectionToken]
      properties:
        inspectionToken:
          type: string
          minLength: 40
          maxLength: 100
          description: Capability returned by this user's exact /api/inspect request.
        editedMetadata:
          type: object
          description: "{ edits: Record<field, { value, meta }> }"
    SubmissionCreateResponse:
      type: object
      properties:
        submissionId: { type: string }
        status: { type: string }
    EditorialDecisionRequest:
      type: object
      required: [submissionId, decision]
      properties:
        submissionId: { type: string }
        decision: { type: string, enum: [accept, reject, request-changes] }
        note: { type: string }
        overrides:
          type: array
          maxItems: 30
          description: One explicit rationale for each failed publication-consistency check.
          items:
            type: object
            required: [checkId, rationale]
            properties:
              checkId: { type: string, minLength: 1, maxLength: 120 }
              rationale: { type: string, minLength: 20, maxLength: 4000 }
    TrustVerificationRequest:
      type: object
      required: [assessmentId, status, rationale, expectedRevision, expectedAssessmentHash]
      properties:
        assessmentId: { type: string }
        subjectType:
          type: string
          enum: [claim-citation, node-relation]
          default: claim-citation
          description: Omit for backward-compatible claim-citation verification.
        status: { type: string, enum: [human-reviewed, adjudicated] }
        rationale: { type: string, minLength: 10, maxLength: 4000 }
        expectedRevision: { type: integer, minimum: 0 }
        expectedAssessmentHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
    TrustAdjudicationRequest:
      type: object
      additionalProperties: false
      required:
        [
          subjectType,
          assessmentIds,
          expectedDisagreementHash,
          outcome,
          rationale,
          conflictOfInterest,
        ]
      properties:
        subjectType: { type: string, enum: [claim-citation, node-relation] }
        assessmentIds:
          type: array
          minItems: 2
          maxItems: 100
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 200 }
          description: Exact assessment identifiers in one current, same-protocol disagreement set.
        expectedDisagreementHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: Optimistic-concurrency hash from the current disagreement queue entry.
        outcome:
          type: string
          enum: [disagreement-upheld, assessment-upheld, reassessment-requested]
        selectedAssessmentId:
          type: string
          minLength: 1
          maxLength: 200
          description: Required exactly when outcome is assessment-upheld; must occur in assessmentIds.
        rationale: { type: string, minLength: 20, maxLength: 10000 }
        conflictOfInterest:
          $ref: "#/components/schemas/ConflictOfInterestSnapshot"
        administratorOverride:
          type: boolean
          default: false
          description: Requires an ADMIN, direct involvement, and conflict-declared.
    ConflictOfInterestSnapshot:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { type: string, enum: [none-declared, conflict-declared, not-provided] }
    PublicTrustAdjudication:
      type: object
      additionalProperties: false
      required:
        [
          id,
          subjectType,
          protocolVersion,
          assessmentIds,
          outcome,
          adjudicator,
          conflictOfInterest,
          disagreementHash,
          outcomeHash,
          createdAt,
          valid,
        ]
      properties:
        id: { type: string, minLength: 1 }
        subjectType: { type: string, enum: [claim-citation, node-relation] }
        protocolVersion: { type: string, minLength: 1 }
        assessmentIds:
          type: array
          minItems: 2
          items: { type: string, minLength: 1 }
        outcome:
          type: string
          enum: [disagreement-upheld, assessment-upheld, reassessment-requested]
        selectedAssessmentId: { type: string, minLength: 1 }
        adjudicator:
          type: object
          additionalProperties: false
          required: [githubLogin]
          properties:
            githubLogin: { type: string, minLength: 1 }
        conflictOfInterest:
          $ref: "#/components/schemas/ConflictOfInterestSnapshot"
        administratorOverride:
          type: object
          additionalProperties: false
          required: [administrator, exercisedAt]
          properties:
            administrator:
              type: object
              additionalProperties: false
              required: [githubLogin]
              properties:
                githubLogin: { type: string, minLength: 1 }
            exercisedAt: { type: string, format: date-time }
        disagreementHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        outcomeHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        createdAt: { type: string, format: date-time }
        valid: { type: boolean }
    TrustAdjudicatorDesignationRequest:
      type: object
      additionalProperties: false
      required: [userId, active]
      properties:
        userId: { type: string, minLength: 1, maxLength: 200 }
        active: { type: boolean }
    TrustAdjudicatorDesignation:
      type: object
      additionalProperties: false
      required: [userId, active]
      properties:
        userId: { type: string }
        active: { type: boolean }
    ReviewLifecycleRequest:
      type: object
      required: [reviewSlug, reviewVersionId, kind, reason, expectedRevision]
      properties:
        reviewSlug: { type: string, minLength: 1, maxLength: 200 }
        reviewVersionId: { type: string, minLength: 1, maxLength: 200 }
        kind: { type: string, enum: [correction, withdrawal, tombstone] }
        reason: { type: string, minLength: 20, maxLength: 5000 }
        expectedRevision: { type: integer, minimum: 0 }
        supersedesVersionId:
          type: string
          description: Required only for correction; must belong to the same review.
    DiscussRequest:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 3, maxLength: 1000 }
        reviewSlugs:
          type: array
          items: { type: string }
    CommentCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 5000 }
        kind:
          type: string
          enum: [comment, question, concern, suggestion, endorsement]
          default: comment
        claimLocalId:
          type: string
          description: Local id of a claim in the review's current version to anchor the comment to.
        parentId:
          type: string
          description: Id of the comment being replied to. Threads are one level deep.
    PublicReviewTrustAssessment:
      type: object
      additionalProperties: false
      required:
        [
          assessmentId,
          assessorType,
          reviewStatus,
          verificationState,
          protocolVersion,
          criteria,
          limitations,
          sourceAssertion,
        ]
      properties:
        assessmentId: { type: string }
        assessorType: { type: string }
        assessorId: { type: string }
        assessedAt: { type: string, format: date-time }
        reviewStatus: { type: string }
        verificationState:
          type: string
          enum: [platform-verified, unverified-import, stale-verification, legacy-unknown]
        protocolVersion: { type: string }
        criteria:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [criterion, rating, status]
            properties:
              criterion: { type: string }
              rating: { type: string }
              status: { type: string }
              rationale: { type: string }
        limitations: { type: array, items: { type: string } }
        aggregateScore: { type: number, minimum: 0, maximum: 1 }
        aggregateMethod: { type: string }
        sourceAssertion:
          type: object
          additionalProperties: false
          required: [aggregateScore]
          properties:
            reviewStatus: { type: string }
            assessorType: { type: string }
            assessorId: { type: string }
            assessedAt: { type: string, format: date-time }
            relationHumanReviewed: { type: boolean }
            aggregateScore: { type: [number, "null"], minimum: 0, maximum: 1 }
            aggregateMethod: { type: string }
        platformVerification:
          type: object
          additionalProperties: false
          required: [reviewerLogin, reviewerRoleSnapshot, rationale]
          properties:
            reviewerLogin: { type: string }
            reviewerRoleSnapshot: { type: string }
            rationale: { type: string }
        supersedesAssessmentId: { type: string }
    PublicReviewRelation:
      type: object
      additionalProperties: false
      required:
        [relationId, relationType, citationLocalId, citationIsExample, humanReviewed, trusts]
      properties:
        relationId: { type: string }
        relationType: { type: string }
        citationLocalId: { type: string }
        citationTitle: { type: string }
        citationDoi: { type: string }
        citationIsExample: { type: boolean }
        humanReviewed: { type: boolean }
        trust:
          $ref: "#/components/schemas/PublicReviewTrustAssessment"
          description: Legacy singleton projection; absent when multiple assessments exist.
        trusts:
          type: array
          description: Complete, deterministically ordered assessment set with full provenance.
          items: { $ref: "#/components/schemas/PublicReviewTrustAssessment" }
    PublicReviewClaim:
      type: object
      additionalProperties: false
      required: [subjectId, claimId, localClaimId, text, anchor, relations]
      properties:
        subjectId: { type: string }
        claimId: { type: string }
        localClaimId: { type: string }
        text: { type: string }
        section: { type: string }
        anchor: { type: string }
        sourceAnchor: { type: string }
        claimType: { type: string }
        qualification: { type: string }
        relations: { type: array, items: { $ref: "#/components/schemas/PublicReviewRelation" } }
    PublicReviewDetail:
      type: object
      additionalProperties: false
      description: Review detail; D01 relation assessment sets are represented by claims[].relations[].trusts.
      required:
        [
          slug,
          title,
          status,
          publicState,
          isTombstoned,
          lifecycleRevision,
          lifecycleEvents,
          updatedAt,
          keywords,
          domains,
          contributors,
          repository,
          snapshot,
          version,
          identifiers,
          versions,
          claims,
          citations,
          limitations,
          identifierConflicts,
        ]
      properties:
        slug: { type: string }
        title: { type: string }
        abstract: { type: string }
        reviewType: { type: string }
        licenseSpdx: { type: string }
        publishedReviewUrl: { type: string }
        status: { type: string }
        publicState: { type: string, enum: [published, withdrawn, tombstoned] }
        isTombstoned: { type: boolean }
        lifecycleRevision: { type: integer, minimum: 0 }
        lifecycleEvents:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewLifecycleEvent" }
        acceptedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        keywords: { type: array, items: { type: string } }
        domains: { type: array, items: { type: string } }
        compatibilityLevel: { type: string }
        compatibilityReport: {}
        contributors:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewContributor" }
        repository: { $ref: "#/components/schemas/PublicReviewRepository" }
        snapshot: { $ref: "#/components/schemas/PublicReviewSnapshot" }
        version: { $ref: "#/components/schemas/PublicReviewVersion" }
        identifiers:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewIdentifier" }
        versions:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewVersionSummary" }
        claims: { type: array, items: { $ref: "#/components/schemas/PublicReviewClaim" } }
        citations:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewCitation" }
        limitations: { type: array, items: { type: string } }
        identifierConflicts:
          type: array
          items: { $ref: "#/components/schemas/PublicWorkIdentityAssertion" }
    PublicReviewLifecycleEvent:
      type: object
      additionalProperties: false
      required: [id, kind, reviewVersionId, reason, actorLogin, revision, createdAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [correction, withdrawal, tombstone] }
        reviewVersionId: { type: string }
        supersedesVersionId: { type: string }
        reason: { type: string }
        actorLogin: { type: string }
        revision: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
    PublicReviewContributor:
      type: object
      additionalProperties: false
      required: [displayName, roles, isExampleOrcid]
      properties:
        displayName: { type: string }
        orcid: { type: string }
        githubLogin: { type: string }
        roles: { type: array, items: { type: string } }
        isExampleOrcid: { type: boolean }
    PublicReviewRepository:
      type: object
      additionalProperties: false
      required: [canonicalUrl, owner, name]
      properties:
        canonicalUrl: { type: string }
        owner: { type: string }
        name: { type: string }
        defaultBranch: { type: string }
        pagesUrl: { type: string }
    PublicReviewSnapshot:
      type: object
      additionalProperties: false
      required: [commitSha]
      properties:
        commitSha: { type: string }
        treeSha: { type: string }
    PublicDoiCheck:
      type: object
      additionalProperties: false
      required: [id, description, outcome]
      properties:
        id: { type: string }
        description: { type: string }
        outcome: { type: string, enum: [pass, warn, fail, skipped] }
        details: { type: string }
    PublicPublicationConsistencyReport:
      type: object
      additionalProperties: false
      required:
        [
          schemaVersion,
          status,
          selectedSourceKind,
          selectedCommitSha,
          selectedTreeSha,
          checks,
          errors,
          warnings,
          overridableCheckIds,
          requiresEditorOverride,
        ]
      properties:
        schemaVersion: { const: 1.0.0 }
        status: { type: string, enum: [pass, warn, fail, not-applicable] }
        selectedSourceKind: { type: string, enum: [default-branch, tag, release] }
        selectedCommitSha: { type: string }
        selectedTreeSha: { type: string }
        selectedReleaseTag: { type: string }
        checks: { type: array, items: { $ref: "#/components/schemas/PublicDoiCheck" } }
        errors: { type: array, items: { type: string } }
        warnings: { type: array, items: { type: string } }
        overridableCheckIds: { type: array, items: { type: string } }
        requiresEditorOverride: { type: boolean }
    PublicReviewEditorialOverride:
      type: object
      additionalProperties: false
      required: [checkId, rationale, editorLogin, createdAt]
      properties:
        checkId: { type: string }
        rationale: { type: string }
        editorLogin: { type: string }
        createdAt: { type: string, format: date-time }
    PublicReviewVersion:
      type: object
      additionalProperties: false
      required: [id, isExample, editorialOverrides]
      properties:
        id: { type: string }
        sourceKind: { type: string }
        sourceBranch: { type: string }
        releaseTag: { type: string }
        releaseUrl: { type: string }
        tagObjectSha: { type: string }
        semanticVersion: { type: string }
        versionDoi: { type: string }
        conceptDoi: { type: string }
        zenodoRecordId: { type: string }
        isExample: { type: boolean }
        capturePayloadHash: { type: string }
        publicationConsistency: { $ref: "#/components/schemas/PublicPublicationConsistencyReport" }
        editorialOverrides:
          type: array
          items: { $ref: "#/components/schemas/PublicReviewEditorialOverride" }
    PublicReviewIdentifier:
      type: object
      additionalProperties: false
      required: [scheme, value, relationType, validationStatus, isExample]
      properties:
        scheme: { type: string }
        value: { type: string }
        relationType: { type: string }
        url: { type: string }
        validationStatus: { type: string }
        isExample: { type: boolean }
    PublicReviewVersionSummary:
      type: object
      additionalProperties: false
      required: [id, isExample, isCurrent, publicState]
      properties:
        id: { type: string }
        semanticVersion: { type: string }
        versionDoi: { type: string }
        releaseTag: { type: string }
        publishedAt: { type: string, format: date-time }
        isExample: { type: boolean }
        isCurrent: { type: boolean }
        publicState: { type: string, enum: [published, withdrawn, tombstoned] }
    PublicReviewCitation:
      type: object
      additionalProperties: false
      required: [localCitationId, citationId, workId, canonicalWorkAliases, isExample]
      properties:
        localCitationId: { type: string }
        citationId: { type: string }
        title: { type: string }
        doi: { type: string }
        pmid: { type: string }
        openAlexId: { type: string }
        workId: { type: string }
        canonicalWorkAliases: { type: array, items: { type: string } }
        year: { type: integer }
        source: { type: string }
        isExample: { type: boolean }
    PublicWorkIdentityAssertion:
      type: object
      additionalProperties: false
      required: [citationIds, scheme, values, message]
      properties:
        citationIds: { type: array, items: { type: string } }
        scheme: { type: string, enum: [doi, pmid, openalex] }
        values: { type: array, items: { type: string } }
        message: { type: string }
    ChallengeSubject:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type, claimId]
          properties:
            type: { const: claim }
            claimId: { type: string, minLength: 1, maxLength: 200 }
        - type: object
          additionalProperties: false
          required: [type, relationId]
          properties:
            type: { const: relation }
            relationId: { type: string, minLength: 1, maxLength: 200 }
        - type: object
          additionalProperties: false
          required: [type, assessmentId, criterion]
          properties:
            type: { const: assessment-criterion }
            assessmentId: { type: string, minLength: 1, maxLength: 200 }
            criterion:
              type: string
              enum:
                [
                  identityIntegrity,
                  entailment,
                  sourceAccess,
                  populationRelevance,
                  interventionExposureRelevance,
                  outcomeRelevance,
                  methodologicalSafeguards,
                  statisticalSafeguards,
                  replicationConvergence,
                  conflictDependency,
                ]
    ChallengeCreateRequest:
      type: object
      additionalProperties: false
      required: [reviewVersionId, subject, canonicalSubjectHash, grounds, body]
      properties:
        reviewVersionId: { type: string, minLength: 1, maxLength: 200 }
        subject: { $ref: "#/components/schemas/ChallengeSubject" }
        canonicalSubjectHash:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: Exact server-published subject digest; mismatch fails closed.
        grounds: { type: string, enum: [entailment, source-access, methodology, identity, other] }
        body:
          type: string
          minLength: 1
          maxLength: 10000
          description: Plain text, always rendered escaped.
    ChallengeTransitionRequest:
      type: object
      additionalProperties: false
      required: [expectedRevision, toStatus]
      properties:
        expectedRevision: { type: integer, minimum: 0 }
        toStatus: { type: string, enum: [resolved, dismissed, withdrawn] }
        rationale: { type: string, minLength: 1, maxLength: 5000 }
    ChallengeResponseCreateRequest:
      type: object
      additionalProperties: false
      required: [expectedRevision, body]
      properties:
        expectedRevision: { type: integer, minimum: 0 }
        body:
          {
            type: string,
            minLength: 1,
            maxLength: 10000,
            description: Plain text; rendered escaped.,
          }
    ChallengeModerationRequest:
      type: object
      additionalProperties: false
      required: [expectedContentRevision]
      properties:
        expectedContentRevision: { type: integer, minimum: 0 }
    PublicChallengeActor:
      type: object
      additionalProperties: false
      required: [githubLogin]
      properties:
        githubLogin: { type: string }
        displayName: { type: [string, "null"] }
    PublicChallengeIdentity:
      type: object
      additionalProperties: false
      required: [githubLogin, displayName]
      properties:
        githubLogin: { type: string }
        displayName: { type: [string, "null"] }
    PublicChallengeTransition:
      type: object
      additionalProperties: false
      required: [id, fromStatus, toStatus, actor, revision, createdAt]
      properties:
        id: { type: string }
        fromStatus:
          type: [string, "null"]
          enum: [open, author-responded, resolved, dismissed, withdrawn, null]
        toStatus: { type: string, enum: [open, author-responded, resolved, dismissed, withdrawn] }
        actor: { $ref: "#/components/schemas/PublicChallengeActor" }
        revision: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
    PublicChallengeResponse:
      type: object
      additionalProperties: false
      required: [id, body, contentHash, contentStatus, contentRevision, responder, createdAt]
      properties:
        id: { type: string }
        body: { type: string, description: Empty when contentStatus is removed. }
        contentHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        contentStatus: { type: string, enum: [visible, removed] }
        contentRevision: { type: integer, minimum: 0 }
        responder: { $ref: "#/components/schemas/PublicChallengeIdentity" }
        createdAt: { type: string, format: date-time }
      allOf:
        - if: { properties: { contentStatus: { const: removed } }, required: [contentStatus] }
          then: { properties: { body: { const: "" } }, required: [body] }
    PublicChallenge:
      type: object
      additionalProperties: false
      required:
        [
          id,
          reviewVersionId,
          subjectType,
          subjectLabel,
          subjectHref,
          canonicalSubjectHash,
          filedContentHash,
          grounds,
          body,
          contentStatus,
          contentRevision,
          status,
          revision,
          challenger,
          transitions,
          response,
          createdAt,
        ]
      properties:
        id: { type: string }
        reviewVersionId: { type: string }
        subjectType: { type: string, enum: [claim, relation, assessment-criterion] }
        subjectLabel: { type: string }
        subjectHref: { type: string }
        canonicalSubjectHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        filedContentHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        grounds: { type: string, enum: [entailment, source-access, methodology, identity, other] }
        body: { type: string }
        contentStatus: { type: string, enum: [visible, removed] }
        contentRevision: { type: integer, minimum: 0 }
        status: { type: string, enum: [open, author-responded, resolved, dismissed, withdrawn] }
        revision: { type: integer, minimum: 0 }
        challenger: { $ref: "#/components/schemas/PublicChallengeIdentity" }
        transitions:
          type: array
          items: { $ref: "#/components/schemas/PublicChallengeTransition" }
        response:
          oneOf:
            - type: "null"
            - { $ref: "#/components/schemas/PublicChallengeResponse" }
        createdAt: { type: string, format: date-time }
      allOf:
        - if: { properties: { contentStatus: { const: removed } }, required: [contentStatus] }
          then: { properties: { body: { const: "" } }, required: [body] }
    ChallengeList:
      type: object
      additionalProperties: false
      required: [reviewSlug, reviewVersionId, challenges]
      properties:
        reviewSlug: { type: string }
        reviewVersionId: { type: string }
        challenges: { type: array, items: { $ref: "#/components/schemas/PublicChallenge" } }
    ChallengeCreateResponse:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id: { type: string }
    ChallengeTransitionResponse:
      type: object
      additionalProperties: false
      required: [revision, status]
      properties:
        revision: { type: integer, minimum: 1 }
        status: { type: string, enum: [resolved, dismissed, withdrawn] }
    ChallengeResponseCreateResponse:
      type: object
      additionalProperties: false
      required: [id, revision, status]
      properties:
        id: { type: string }
        revision: { type: integer, minimum: 1 }
        status: { const: author-responded }
    ChallengeModerationResponse:
      type: object
      additionalProperties: false
      required: [contentRevision, contentStatus]
      properties:
        contentRevision: { type: integer, minimum: 1 }
        contentStatus: { const: removed }
    ReplicationClaimRef:
      type: object
      additionalProperties: false
      required: [reviewVersionId, localClaimId]
      properties:
        reviewVersionId: { type: string, minLength: 1, maxLength: 200 }
        localClaimId: { type: string, minLength: 1, maxLength: 120 }
    ReplicationPublicUrl:
      type: string
      format: uri
      maxLength: 2000
      pattern: "^https://[^/?#@]+(?:/[^?#]*)?$"
      description: >
        Canonical public HTTPS URL. Atlas trims and normalizes accepted values and rejects
        credentials, queries, fragments, localhost, single-label or internal hostnames, and
        loopback, private, link-local, multicast, documentation, or reserved IP literals without
        performing DNS or network access.
    ReplicationScope:
      type: object
      additionalProperties: false
      minProperties: 1
      description: At least one bounded scope field is required.
      properties:
        population: { type: string, minLength: 1, maxLength: 300 }
        model: { type: string, minLength: 1, maxLength: 300 }
        intervention: { type: string, minLength: 1, maxLength: 300 }
        outcome: { type: string, minLength: 1, maxLength: 300 }
        method: { type: string, minLength: 1, maxLength: 300 }
        notes: { type: string, minLength: 20, maxLength: 2000 }
    ReplicationBriefCreateRequest:
      type: object
      additionalProperties: false
      required:
        [
          idempotencyKey,
          slug,
          title,
          summary,
          scope,
          expectedInformationGain,
          effortBand,
          citationUrls,
          claims,
        ]
      properties:
        idempotencyKey: { type: string, format: uuid }
        slug:
          type: string
          minLength: 3
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title: { type: string, minLength: 10, maxLength: 300 }
        summary: { type: string, minLength: 50, maxLength: 5000 }
        scope: { $ref: "#/components/schemas/ReplicationScope" }
        expectedInformationGain: { type: string, minLength: 50, maxLength: 5000 }
        effortBand: { type: string, enum: [small, medium, large, consortium] }
        protocolUrl: { $ref: "#/components/schemas/ReplicationPublicUrl" }
        citationUrls:
          type: array
          minItems: 1
          maxItems: 20
          uniqueItems: true
          items: { $ref: "#/components/schemas/ReplicationPublicUrl" }
        claims:
          type: array
          minItems: 1
          maxItems: 20
          uniqueItems: true
          items: { $ref: "#/components/schemas/ReplicationClaimRef" }
    ReplicationBriefTransitionRequest:
      description: Explicit lifecycle transition guarded by expectedRevision compare-and-swap.
      oneOf:
        - type: object
          additionalProperties: false
          required: [action, expectedRevision]
          properties:
            action: { const: publish }
            expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
        - type: object
          additionalProperties: false
          required: [action, expectedRevision, protocolUrl, note]
          properties:
            action: { const: claim }
            expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
            protocolUrl: { $ref: "#/components/schemas/ReplicationPublicUrl" }
            note: { type: string, minLength: 20, maxLength: 2000 }
        - type: object
          additionalProperties: false
          required: [action, expectedRevision, completionUrl, summary]
          properties:
            action: { const: complete }
            expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
            completionUrl: { $ref: "#/components/schemas/ReplicationPublicUrl" }
            summary: { type: string, minLength: 50, maxLength: 5000 }
        - type: object
          additionalProperties: false
          required: [action, expectedRevision, reason]
          properties:
            action: { const: withdraw }
            expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
            reason: { type: string, minLength: 20, maxLength: 5000 }
    ReplicationTriageSignal:
      type: object
      additionalProperties: false
      required: [code, explanation]
      properties:
        code:
          type: string
          enum:
            [
              genuine-contradiction,
              scope-undeclared-contradiction,
              scope-difference,
              opposing-evidence,
              no-independent-support,
              single-independent-family,
              duplicated-evidence-family,
              circular-citation,
              scope-undeclared,
            ]
        explanation: { type: string }
    ReplicationTriageIndependence:
      type: object
      additionalProperties: false
      required:
        [
          supportingWorks,
          independentSupportingFamilies,
          opposingWorks,
          independentOpposingFamilies,
          sharedWorkKeys,
          circularCitationIds,
        ]
      properties:
        supportingWorks: { type: integer, minimum: 0 }
        independentSupportingFamilies: { type: integer, minimum: 0 }
        opposingWorks: { type: integer, minimum: 0 }
        independentOpposingFamilies: { type: integer, minimum: 0 }
        sharedWorkKeys: { type: array, items: { type: string } }
        circularCitationIds:
          type: array
          uniqueItems: true
          items: { type: string }
    ReplicationTriageContradictions:
      type: object
      additionalProperties: false
      required: [genuine, scopeDifference, undeterminedScope]
      properties:
        genuine: { type: integer, minimum: 0 }
        scopeDifference: { type: integer, minimum: 0 }
        undeterminedScope: { type: integer, minimum: 0 }
    ReplicationTriageClaim:
      type: object
      additionalProperties: false
      required: [claimId, triageBand, signals, independence, contradictions]
      properties:
        claimId: { type: string }
        triageBand:
          type: string
          enum:
            [contradiction-attention, independence-attention, scope-attention, routine-attention]
        signals:
          type: array
          items: { $ref: "#/components/schemas/ReplicationTriageSignal" }
        independence: { $ref: "#/components/schemas/ReplicationTriageIndependence" }
        contradictions: { $ref: "#/components/schemas/ReplicationTriageContradictions" }
    ReplicationTriageSnapshot:
      type: object
      additionalProperties: false
      required: [schemaVersion, corpusHash, capturedAt, method, disclaimer, claims]
      properties:
        schemaVersion: { type: string, const: "1.0.0" }
        corpusHash: { type: string, pattern: "^[a-f0-9]{64}$" }
        capturedAt: { type: string, format: date-time }
        method: { type: string, const: oratlas-replication-triage-1.0 }
        disclaimer: { type: string }
        claims:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: "#/components/schemas/ReplicationTriageClaim" }
    ReplicationBriefClaim:
      type: object
      additionalProperties: false
      required: [reviewSlug, reviewVersionId, localClaimId, text, passportPath]
      properties:
        reviewSlug: { type: string }
        reviewVersionId: { type: string }
        localClaimId: { type: string }
        text: { type: string }
        passportPath: { type: string }
    ReplicationBrief:
      type: object
      additionalProperties: false
      required:
        [
          slug,
          title,
          summary,
          scope,
          expectedInformationGain,
          effortBand,
          citationUrls,
          status,
          revision,
          claims,
          createdByLogin,
          createdAt,
          updatedAt,
        ]
      properties:
        slug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        title: { type: string }
        summary: { type: string }
        scope: { $ref: "#/components/schemas/ReplicationScope" }
        expectedInformationGain: { type: string }
        effortBand: { type: string, enum: [small, medium, large, consortium] }
        protocolUrl: { $ref: "#/components/schemas/ReplicationPublicUrl" }
        citationUrls:
          type: array
          minItems: 1
          maxItems: 20
          uniqueItems: true
          items: { $ref: "#/components/schemas/ReplicationPublicUrl" }
        status: { type: string, enum: [draft, open, claimed, completed, withdrawn] }
        revision: { type: integer, minimum: 0, maximum: 1000000000 }
        triageSnapshot: { $ref: "#/components/schemas/ReplicationTriageSnapshot" }
        claims:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: "#/components/schemas/ReplicationBriefClaim" }
        createdByLogin: { type: string }
        publishedByLogin: { type: string }
        publishedAt: { type: string, format: date-time }
        claimedByLogin: { type: string }
        claimedAt: { type: string, format: date-time }
        claimNote:
          type: string
          description: Public note published with the attributable claimant account.
        completedByLogin: { type: string }
        completedAt: { type: string, format: date-time }
        completionUrl: { $ref: "#/components/schemas/ReplicationPublicUrl" }
        completionSummary: { type: string }
        withdrawnByLogin: { type: string }
        withdrawnAt: { type: string, format: date-time }
        withdrawalReason: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ReplicationMarketplacePage:
      type: object
      additionalProperties: false
      required: [page, pageSize, total, briefs]
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 50 }
        total: { type: integer, minimum: 0 }
        briefs: { type: array, items: { $ref: "#/components/schemas/ReplicationBrief" } }
    ReplicationBriefMutationResult:
      type: object
      additionalProperties: false
      required: [slug, status, revision]
      properties:
        slug: { type: string }
        status: { type: string, enum: [draft, open, claimed, completed, withdrawn] }
        revision: { type: integer, minimum: 0, maximum: 1000000000 }
        idempotent: { type: boolean }
    SynthesisSeriesSelection:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind, nodeId]
          properties:
            kind: { const: seed }
            nodeId: { type: string, minLength: 1, maxLength: 200 }
        - type: object
          additionalProperties: false
          required: [kind, canonicalQuery]
          properties:
            kind: { const: topic }
            canonicalQuery: { type: string, minLength: 1, maxLength: 500 }
    SynthesisSelector:
      type: object
      additionalProperties: false
      required:
        [
          schemaVersion,
          selection,
          depth,
          maxNodes,
          maxEdges,
          relationTypes,
          trustPolicy,
          currentVersionPolicy,
          topicSeedPolicy,
          topicSeedLimit,
          edgePolicy,
          includeContradictions,
        ]
      properties:
        schemaVersion: { const: synthesis-selector/1.0.0 }
        selection: { $ref: "#/components/schemas/SynthesisSeriesSelection" }
        depth: { type: integer, minimum: 1, maximum: 3 }
        maxNodes: { type: integer, minimum: 1, maximum: 100 }
        maxEdges: { type: integer, minimum: 0, maximum: 500 }
        relationTypes:
          type: array
          minItems: 1
          maxItems: 7
          uniqueItems: true
          contains: { const: contradicts }
          items:
            {
              type: string,
              enum:
                [supports, contradicts, replicates, extends, uses-dataset, uses-code, derives-from],
            }
        trustPolicy: { const: authoritative-current-relation-trust-v1 }
        currentVersionPolicy: { const: newest-valid-no-history-fallback }
        topicSeedPolicy: { const: current-public-title-abstract-search-v1 }
        topicSeedLimit: { type: integer, minimum: 1, maximum: 10 }
        edgePolicy: { const: editor-confirmed-exact-versions-only }
        includeContradictions: { const: true }
    SynthesisGenerationRequest:
      type: object
      additionalProperties: false
      required: [selector, requestKey]
      properties:
        selector: { $ref: "#/components/schemas/SynthesisSelector" }
        requestKey: { type: string, minLength: 8, maxLength: 200 }
    SynthesisAcceptanceChecklist:
      type: object
      additionalProperties: false
      required:
        [
          groundingAndCitationsReviewed,
          contradictionAndNonConsensusFramingReviewed,
          attributionAndAiDisclosureReviewed,
          limitationsReviewed,
          privacyAndInjectionLeakageReviewed,
          rightsAndLicenseConfirmed,
        ]
      properties:
        groundingAndCitationsReviewed: { const: true }
        contradictionAndNonConsensusFramingReviewed: { const: true }
        attributionAndAiDisclosureReviewed: { const: true }
        limitationsReviewed: { const: true }
        privacyAndInjectionLeakageReviewed: { const: true }
        rightsAndLicenseConfirmed: { const: true }
    SynthesisDecisionBase:
      type: object
      required: [action, expectedRevision, idempotencyKey, rationale]
      properties:
        expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
        idempotencyKey: { type: string, minLength: 8, maxLength: 200 }
        rationale: { type: string, minLength: 10, maxLength: 4000 }
    SynthesisDecision:
      oneOf:
        - allOf:
            - { $ref: "#/components/schemas/SynthesisDecisionBase" }
            - type: object
              additionalProperties: false
              required:
                [
                  action,
                  expectedRevision,
                  idempotencyKey,
                  rationale,
                  licenseSpdx,
                  rightsStatement,
                  checklist,
                ]
              properties:
                action: { const: accept }
                expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
                idempotencyKey: { type: string, minLength: 8, maxLength: 200 }
                rationale: { type: string, minLength: 10, maxLength: 4000 }
                licenseSpdx:
                  type: string
                  minLength: 1
                  maxLength: 120
                  description: A supported SPDX license expression using SPDX identifiers and AND, OR, WITH, or parentheses.
                  x-oratlas-validation: spdx-expression/1.0.0
                rightsStatement: { type: string, minLength: 10, maxLength: 2000 }
                versionDoi:
                  {
                    type: string,
                    pattern: "^10\\.[0-9]{4,9}/\\S+$",
                    not: { pattern: "^10\\.5555/" },
                  }
                conceptDoi:
                  {
                    type: string,
                    pattern: "^10\\.[0-9]{4,9}/\\S+$",
                    not: { pattern: "^10\\.5555/" },
                  }
                checklist: { $ref: "#/components/schemas/SynthesisAcceptanceChecklist" }
        - type: object
          additionalProperties: false
          required: [action, expectedRevision, idempotencyKey, rationale]
          properties:
            action: { type: string, enum: [reject, request-regeneration] }
            expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
            idempotencyKey: { type: string, minLength: 8, maxLength: 200 }
            rationale: { type: string, minLength: 10, maxLength: 4000 }
    SynthesisReviewCitation:
      type: object
      additionalProperties: false
      required: [referenceId, nodeId, nodeVersionId]
      properties:
        referenceId: { type: string, pattern: "^reference:sha256:[0-9a-f]{64}$" }
        nodeId: { type: string, minLength: 1, maxLength: 200 }
        nodeVersionId: { type: string, minLength: 1, maxLength: 200 }
    SynthesisReviewParagraph:
      type: object
      additionalProperties: false
      required: [text, citations]
      properties:
        text: { type: string, minLength: 1, maxLength: 4000 }
        citations:
          type: array
          maxItems: 50
          uniqueItems: true
          items: { $ref: "#/components/schemas/SynthesisReviewCitation" }
    SynthesisReviewSection:
      type: object
      additionalProperties: false
      required: [id, title, paragraphs]
      properties:
        id:
          type: string
          enum:
            [
              background,
              state-of-knowledge,
              agreements,
              contradictions-and-open-questions,
              data-and-code-availability,
              limitations,
            ]
        title:
          type: string
          enum:
            [
              Background,
              State of knowledge,
              Agreements,
              Contradictions and open questions,
              Data and code availability,
              Limitations,
            ]
        paragraphs:
          type: array
          minItems: 1
          maxItems: 12
          items: { $ref: "#/components/schemas/SynthesisReviewParagraph" }
    SynthesisReviewDocument:
      type: object
      additionalProperties: false
      required: [schemaVersion, title, summary, citations, sections]
      properties:
        schemaVersion: { const: 1.0.0 }
        title: { type: string, minLength: 1, maxLength: 300 }
        summary: { type: string, minLength: 1, maxLength: 2000 }
        citations:
          type: array
          maxItems: 50
          uniqueItems: true
          items: { $ref: "#/components/schemas/SynthesisReviewCitation" }
        sections:
          type: array
          minItems: 6
          maxItems: 6
          items: { $ref: "#/components/schemas/SynthesisReviewSection" }
    SynthesisPipelineSoftware:
      type: object
      additionalProperties: false
      required: [id, kind, displayName, pipelineVersion]
      properties:
        id: { const: "software:oratlas-synthesis-writer" }
        kind: { const: software-agent }
        displayName: { const: Open Review Atlas Synthesis Writer }
        pipelineVersion: { type: string, minLength: 1, maxLength: 120 }
    SynthesisGenerationProvenance:
      type: object
      additionalProperties: false
      required:
        [
          generationMode,
          pipelineSoftware,
          provider,
          model,
          modelVersion,
          promptVersion,
          promptHash,
          packetHash,
          documentHash,
          generatedAt,
          attributionPolicyVersion,
          materializationPolicyVersion,
        ]
      properties:
        generationMode: { type: string, enum: [llm, deterministic-template] }
        pipelineSoftware: { $ref: "#/components/schemas/SynthesisPipelineSoftware" }
        provider: { type: string, minLength: 1, maxLength: 120 }
        model: { type: string, minLength: 1, maxLength: 200 }
        modelVersion: { type: string, minLength: 1, maxLength: 200 }
        promptVersion: { type: string, minLength: 1, maxLength: 120 }
        promptHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        packetHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        documentHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        generatedAt: { type: string, format: date-time }
        attributionPolicyVersion: { const: synthesis-attribution/1.0.0 }
        materializationPolicyVersion: { const: synthesis-materialization/1.0.0 }
    SynthesisApprovingEditor:
      type: object
      additionalProperties: false
      required: [displayName, githubLogin, roleSnapshot]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 200 }
        githubLogin: { type: string, minLength: 1, maxLength: 100 }
        roleSnapshot: { type: string, enum: [EDITOR, ADMIN] }
    AcceptedSynthesisProvenance:
      type: object
      additionalProperties: false
      description: >
        Public provenance for one immutable accepted synthesis version. Policy/checklist enums are
        append-only compatibility registries so older accepted versions remain readable.
      required:
        [
          generationMode,
          pipelineSoftware,
          provider,
          model,
          modelVersion,
          promptVersion,
          promptHash,
          packetHash,
          documentHash,
          generatedAt,
          attributionPolicyVersion,
          materializationPolicyVersion,
          acceptedAt,
          approvingEditor,
          rightsStatement,
          licenseSpdx,
          checklistVersion,
          acceptedPredecessorVersionId,
          acceptedPredecessorOrdinal,
          ordinal,
        ]
      properties:
        generationMode: { type: string, enum: [llm, deterministic-template] }
        pipelineSoftware: { $ref: "#/components/schemas/SynthesisPipelineSoftware" }
        provider: { type: string, minLength: 1, maxLength: 120 }
        model: { type: string, minLength: 1, maxLength: 200 }
        modelVersion: { type: string, minLength: 1, maxLength: 200 }
        promptVersion: { type: string, minLength: 1, maxLength: 120 }
        promptHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        packetHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        documentHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        generatedAt: { type: string, format: date-time }
        attributionPolicyVersion: { type: string, enum: [synthesis-attribution/1.0.0] }
        materializationPolicyVersion: { type: string, enum: [synthesis-materialization/1.0.0] }
        acceptedAt: { type: string, format: date-time }
        approvingEditor: { $ref: "#/components/schemas/SynthesisApprovingEditor" }
        rightsStatement: { type: string, minLength: 10, maxLength: 2000 }
        licenseSpdx:
          type: string
          minLength: 1
          maxLength: 120
          description: A supported SPDX license expression using SPDX identifiers and AND, OR, WITH, or parentheses.
          x-oratlas-validation: spdx-expression/1.0.0
        checklistVersion: { type: string, enum: [synthesis-checklist/1.0.0] }
        acceptedPredecessorVersionId: { type: [string, "null"], minLength: 1, maxLength: 200 }
        acceptedPredecessorOrdinal: { type: [integer, "null"], minimum: 1 }
        ordinal: { type: integer, minimum: 1 }
    EditorialSynthesisCitation:
      type: object
      additionalProperties: false
      required: [referenceId, nodeId, nodeVersionId, nodeKind, title, location, occurrenceOrdinal]
      properties:
        referenceId: { type: string, minLength: 1 }
        nodeId: { type: string, minLength: 1, maxLength: 200 }
        nodeVersionId: { type: string, minLength: 1, maxLength: 200 }
        nodeKind: { type: string, enum: [claim, figure, dataset, code] }
        title: { type: string, minLength: 1, maxLength: 500 }
        location: { type: string, minLength: 1, maxLength: 200 }
        occurrenceOrdinal: { type: integer, minimum: 0 }
        identifierScheme: { type: string, minLength: 1, maxLength: 40 }
        identifierRole: { type: string, minLength: 1, maxLength: 80 }
        identifierValue: { type: string, minLength: 1, maxLength: 500 }
    PublicSynthesisCitation:
      type: object
      additionalProperties: false
      required:
        [referenceId, nodeId, nodeVersionId, nodeKind, title, href, location, occurrenceOrdinal]
      properties:
        referenceId: { type: string, minLength: 1 }
        nodeId: { type: string, minLength: 1, maxLength: 200 }
        nodeVersionId: { type: string, minLength: 1, maxLength: 200 }
        nodeKind: { type: string, enum: [claim, figure, dataset, code] }
        title: { type: string, minLength: 1, maxLength: 500 }
        href: { type: string, pattern: "^/nodes/[^/]+/versions/[^/]+$" }
        location: { type: string, minLength: 1, maxLength: 200 }
        occurrenceOrdinal: { type: integer, minimum: 0 }
        identifierScheme: { type: string, minLength: 1, maxLength: 40 }
        identifierRole: { type: string, minLength: 1, maxLength: 80 }
        identifierValue: { type: string, minLength: 1, maxLength: 500 }
    PublicSynthesisVersion:
      type: object
      additionalProperties: false
      required: [id, ordinal, isCurrent]
      properties:
        id: { type: string, minLength: 1, maxLength: 200 }
        ordinal: { type: integer, minimum: 1 }
        isCurrent: { type: boolean }
        versionDoi:
          type: string
          pattern: "^10\\.[0-9]{4,9}/\\S+$"
          not: { pattern: "^10\\.5555/" }
        conceptDoi:
          type: string
          pattern: "^10\\.[0-9]{4,9}/\\S+$"
          not: { pattern: "^10\\.5555/" }
      description: Version and concept DOIs are normalized, reserved-example-free, and distinct when both are present.
    SynthesisStalenessReasonCode:
      type: string
      enum:
        [
          materialization-policy-changed,
          node-head-changed,
          membership-added,
          membership-removed,
          confirmed-edge-added,
          confirmed-edge-removed,
          confirmed-edge-changed,
          trust-changed,
          packet-content-changed,
          materialization-failed,
        ]
    SynthesisFreshness:
      type: object
      additionalProperties: false
      required: [status, policyVersion, reasonCodes, affectedReferenceCount]
      properties:
        status: { type: string, enum: [unchecked, fresh, stale] }
        policyVersion: { const: synthesis-staleness/1.0.0 }
        evaluatedAt: { type: string, format: date-time }
        reasonCodes:
          type: array
          uniqueItems: true
          maxItems: 10
          items: { $ref: "#/components/schemas/SynthesisStalenessReasonCode" }
        affectedReferenceCount: { type: integer, minimum: 0, maximum: 1201 }
    SynthesisAffectedReference:
      type: object
      additionalProperties: false
      required: [kind, id, change]
      properties:
        kind: { type: string, enum: [node, edge, trust, policy] }
        id: { type: string, minLength: 1, maxLength: 200 }
        change: { type: string, enum: [added, removed, changed] }
        previousVersionId: { type: string, minLength: 1, maxLength: 200 }
        currentVersionId: { type: string, minLength: 1, maxLength: 200 }
    SynthesisStalenessEvaluationResult:
      type: object
      additionalProperties: false
      required:
        [
          evaluationKey,
          reviewSlug,
          acceptedReviewVersionId,
          status,
          reasonCodes,
          affectedReferences,
          affectedReferenceCount,
          affectedReferencesTruncated,
        ]
      properties:
        evaluationKey: { type: string, pattern: "^[0-9a-f]{64}$" }
        reviewSlug: { type: string, minLength: 1, maxLength: 200 }
        acceptedReviewVersionId: { type: string, minLength: 1, maxLength: 200 }
        status: { type: string, enum: [fresh, stale] }
        reasonCodes:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/SynthesisStalenessReasonCode" }
        affectedReferences:
          type: array
          maxItems: 100
          items: { $ref: "#/components/schemas/SynthesisAffectedReference" }
        affectedReferenceCount: { type: integer, minimum: 0, maximum: 1201 }
        affectedReferencesTruncated: { type: boolean }
    SynthesisStalenessScanResult:
      type: object
      additionalProperties: false
      required: [scanned, succeeded, failed, results, failures]
      properties:
        scanned: { type: integer, minimum: 0, maximum: 100 }
        succeeded: { type: integer, minimum: 0, maximum: 100 }
        failed: { type: integer, minimum: 0, maximum: 100 }
        nextCursor: { type: string, minLength: 1, maxLength: 200 }
        results:
          type: array
          maxItems: 100
          items: { $ref: "#/components/schemas/SynthesisStalenessEvaluationResult" }
        failures:
          type: array
          maxItems: 100
          items:
            type: object
            additionalProperties: false
            required: [code]
            properties:
              code: { const: evaluation-failed }
              reviewSlug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$", maxLength: 200 }
    SynthesisRegenerationProposalDecision:
      type: object
      additionalProperties: false
      required: [action, expectedRevision, idempotencyKey, rationale]
      properties:
        action: { type: string, enum: [request-regeneration, dismiss] }
        expectedRevision: { type: integer, minimum: 0, maximum: 1000000000 }
        idempotencyKey: { type: string, minLength: 8, maxLength: 200 }
        rationale: { type: string, minLength: 10, maxLength: 4000 }
    SynthesisRegenerationProposalDecisionResult:
      type: object
      additionalProperties: false
      required: [status, revision]
      properties:
        status: { type: string, enum: [regeneration-requested, dismissed] }
        revision: { type: integer, minimum: 1 }
    EditorialSynthesisDraft:
      type: object
      additionalProperties: false
      required:
        [
          id,
          status,
          revision,
          seriesKey,
          selector,
          generationKey,
          regenerationOrdinal,
          document,
          provenance,
          citations,
        ]
      properties:
        id: { type: string }
        status: { type: string, enum: [pending, accepted, rejected, regeneration-requested] }
        revision: { type: integer, minimum: 0 }
        seriesKey: { type: string, pattern: "^[0-9a-f]{64}$" }
        selector: { $ref: "#/components/schemas/SynthesisSelector" }
        generationKey: { type: string, pattern: "^[0-9a-f]{64}$" }
        regenerationOrdinal: { type: integer, minimum: 1 }
        parentDraftId: { type: string }
        previousAcceptedOrdinal: { type: integer, minimum: 1 }
        document: { $ref: "#/components/schemas/SynthesisReviewDocument" }
        provenance: { $ref: "#/components/schemas/SynthesisGenerationProvenance" }
        citations:
          type: array
          items: { $ref: "#/components/schemas/EditorialSynthesisCitation" }
    SynthesisDecisionResult:
      type: object
      additionalProperties: false
      required: [status, revision]
      properties:
        status: { type: string, enum: [accepted, rejected, regeneration-requested] }
        revision: { type: integer, minimum: 1 }
        reviewSlug: { type: string }
        reviewVersionId: { type: string }
    PublicSynthesisReview:
      type: object
      additionalProperties: false
      description: >
        Strict public allowlist for an editor-accepted AI synthesis. Draft/run identifiers,
        selector and request keys, packet/prompt/provider bytes, errors, rationale, notes, and
        credentials are private and forbidden by additionalProperties=false.
      required:
        [slug, reviewType, title, abstract, document, provenance, citations, version, freshness]
      properties:
        slug: { type: string }
        reviewType: { const: ai-synthesis }
        title: { type: string, minLength: 1, maxLength: 300 }
        abstract: { type: string, minLength: 1, maxLength: 2000 }
        document: { $ref: "#/components/schemas/SynthesisReviewDocument" }
        provenance: { $ref: "#/components/schemas/AcceptedSynthesisProvenance" }
        citations:
          type: array
          items: { $ref: "#/components/schemas/PublicSynthesisCitation" }
        version: { $ref: "#/components/schemas/PublicSynthesisVersion" }
        freshness: { $ref: "#/components/schemas/SynthesisFreshness" }
paths:
  /api/health:
    get:
      summary: Liveness check
      description: Dependency-free liveness probe; always returns quickly when the process is up.
      responses:
        "200": { description: OK }
  /api/health/ready:
    get:
      summary: Readiness check
      description: >
        Readiness probe for load balancers. Performs a trivial database round-trip and returns 503
        when a dependency is unavailable. No error detail is leaked in the body.
      responses:
        "200": { description: Ready }
        "503": { description: Unavailable }
  /api/inspect:
    post:
      summary: Capture an explicitly selected immutable repository source
      description: >
        Sign-in, exact same-origin JSON, and an explicit default-branch/tag/release selection are
        required. Returns an expiring, single-use capability bound to the user and exact canonical
        capture bytes. A release is classified through GitHub's exact release-by-tag endpoint.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InspectRequest" }
      responses:
        "200":
          description: Inspection result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/validate-doi:
    post:
      summary: Validate a DOI and return a structured report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DoiValidationRequest" }
      responses:
        "200": { description: Structured DOI validation report }
        "400": { $ref: "#/components/responses/Error" }
  /api/submissions:
    post:
      summary: Consume one exact inspection capture and finalize a submission
      description: >
        Does not re-inspect GitHub. The capability, repository/snapshot, canonical submission,
        capture consumption and audit event are committed atomically.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmissionCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmissionCreateResponse" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/decision:
    post:
      summary: Transactional, idempotent editorial decision (editor role required)
      description: >
        Acceptance uses a compare-and-set terminal transition. Review/version/evidence rows,
        check-scoped exceptions and idempotent audit events commit together. Every failed
        consistency check requires its own override rationale.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EditorialDecisionRequest" }
      responses:
        "200": { description: Decision recorded }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/trust:
    post:
      summary: Record a hash-bound Atlas structural review of an imported TRUST assessment
      description: >
        Editor role, an exact same-origin Origin header, same-origin Fetch Metadata when present,
        and application/json are required. The expected hash and revision provide optimistic
        concurrency; a mismatch returns 409. This records provenance/structure review, not
        scientific correctness.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrustVerificationRequest" }
      responses:
        "200": { description: Verification marker recorded }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/editorial/trust/adjudications:
    post:
      summary: Record an immutable adjudication of a current TRUST disagreement
      description: >
        Editor or designated-adjudicator authority, exact same-origin application/json, and a
        current disagreement hash are required. Referenced assessments must form one current,
        same-protocol disagreement set. Directly involved adjudicators must recuse unless an
        administrator records the explicit conflict-declared override. Repeating the identical
        outcome is idempotent; a different outcome for the same disagreement returns 409.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrustAdjudicationRequest" }
      responses:
        "200":
          description: Existing or newly recorded public adjudication
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicTrustAdjudication" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/trust/adjudicators:
    post:
      summary: Designate or revoke a TRUST adjudicator (administrator role required)
      description: >
        Administrator role, exact same-origin application/json, and an existing user identifier
        are required. The designation is upserted and its activation or revocation is audited.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrustAdjudicatorDesignationRequest" }
      responses:
        "200":
          description: Current adjudicator designation state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrustAdjudicatorDesignation" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/editorial/lifecycle:
    post:
      summary: Append a version-bound correction, withdrawal or tombstone
      description: >
        Editor role, exact same-origin application/json, and expected review lifecycle revision
        are required. Target and superseded versions must belong to the same review and carry
        exact non-zero commits. State guard, event and audit commit atomically.
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewLifecycleRequest" }
      responses:
        "201": { description: Append-only lifecycle event recorded }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /api/search:
    get:
      summary: Search repository reviews, knowledge nodes, and accepted AI syntheses
      description: >
        Merges all public record kinds deterministically before applying one page window.
        Knowledge-node candidates are capped at 2,000. Accepted AI synthesis candidates receive
        strict current-head and integrity validation and are capped at 500 per request. The response
        marks when that synthesis ceiling is reached; its total and pages then describe the bounded
        result set and do not claim a global synthesis total.
      parameters:
        - name: contentType
          in: query
          description: >
            review means repository-based review; synthesis means editor-accepted AI synthesis.
          schema: { type: string, enum: [all, review, node, synthesis], default: all }
        - {
            name: nodeKind,
            in: query,
            schema: { type: string, enum: [claim, figure, dataset, code] },
          }
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - { name: domain, in: query, schema: { type: string, maxLength: 100 } }
        - { name: author, in: query, schema: { type: string, maxLength: 200 } }
        - { name: hasDoi, in: query, schema: { type: boolean } }
        - { name: hasTrustData, in: query, schema: { type: boolean } }
        - { name: hasEvidenceData, in: query, schema: { type: boolean } }
        - { name: compatibility, in: query, schema: { type: string, maxLength: 40 } }
        - name: trustReviewState
          in: query
          schema: { type: string, enum: [any, human-reviewed, agent-proposed-only] }
        - {
            name: sort,
            in: query,
            schema:
              { type: string, enum: [accepted, updated, title, relevance], default: accepted },
          }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            name: pageSize,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
      responses:
        "200":
          description: Deterministically merged, possibly bounded archive result page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveSearchResponse" }
        "400": { $ref: "#/components/responses/Error" }
  /api/graph:
    get:
      summary: Query a bounded public knowledge subgraph by seed node or topic
      description: >
        Traverses canonical directed edges in both directions, so contradictions appear from
        either endpoint without duplicating or reversing their edge identity. Confirmed edges are
        the default. The proposed view is privacy-minimal and never exposes rejected/superseded
        proposals, raw evidence, agent runs, reviewer identity, review notes or audit data.
      parameters:
        - { name: seed, in: query, schema: { type: string, maxLength: 200 } }
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - { name: depth, in: query, schema: { type: integer, minimum: 0, maximum: 3, default: 1 } }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 25 },
          }
        - { name: cursor, in: query, schema: { type: string, maxLength: 768 } }
        - { name: kind, in: query, schema: { type: string, enum: [claim, figure, dataset, code] } }
        - name: relationType
          in: query
          schema:
            {
              type: string,
              enum:
                [supports, contradicts, replicates, extends, uses-dataset, uses-code, derives-from],
            }
        - {
            name: edgeStatus,
            in: query,
            schema: { type: string, enum: [confirmed, proposed], default: confirmed },
          }
        - name: hasTrust
          in: query
          description: Filter edges by presence of an exact relation-scoped TRUST assessment
          schema: { type: boolean }
      responses:
        "200":
          description: One cursor page of exact-version graph nodes and edges
          headers:
            RateLimit-Limit: { schema: { type: integer }, description: Configured request budget }
            RateLimit-Remaining: { schema: { type: integer }, description: Requests remaining }
            RateLimit-Reset:
              { schema: { type: integer }, description: Fixed-window reset as Unix epoch seconds }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicGraphResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "429":
          description: Structured rate-limit error
          headers:
            Retry-After: { schema: { type: integer }, description: Seconds until retry }
            RateLimit-Limit: { schema: { type: integer }, description: Configured request budget }
            RateLimit-Remaining: { schema: { type: integer }, description: Always zero }
            RateLimit-Reset:
              { schema: { type: integer }, description: Fixed-window reset as Unix epoch seconds }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /api/nodes:
    get:
      summary: List accepted knowledge nodes
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 500 } }
        - { name: kind, in: query, schema: { type: string, enum: [claim, figure, dataset, code] } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - {
            name: pageSize,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 50, default: 20 },
          }
      responses:
        "200":
          description: Paginated node summaries from a deterministic POC scan capped at 2,000 nodes
          content:
            application/json:
              schema:
                type: object
                required: [total, page, pageSize, items]
                properties:
                  total: { type: integer, minimum: 0 }
                  page: { type: integer, minimum: 1 }
                  pageSize: { type: integer, minimum: 1 }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PublicNodeSummary" }
        "400": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}:
    get:
      summary: Retrieve the current immutable version and public graph context for a stable node
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Current node detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicNodeDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}/versions:
    get:
      summary: List immutable versions of a stable knowledge node
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The newest 200 immutable versions; exact older-version URLs remain readable
          content:
            application/json:
              schema:
                type: object
                required: [nodeId, currentVersionId, items]
                properties:
                  nodeId: { type: string }
                  currentVersionId: { type: string }
                  items:
                    type: array
                    maxItems: 200
                    items: { $ref: "#/components/schemas/PublicNodeVersionSummary" }
        "404": { $ref: "#/components/responses/Error" }
  /api/nodes/{id}/versions/{versionId}:
    get:
      summary: Retrieve one exact immutable knowledge-node version
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Historical node detail; graph context is separately labelled and may evolve
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicNodeDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}:
    get:
      summary: Retrieve a review by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Review detail with complete relation-scoped assessment sets
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicReviewDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/claims:
    get:
      summary: Search claims across reviews
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: reviewSlug, in: query, schema: { type: string } }
        - { name: relationType, in: query, schema: { type: string } }
      responses:
        "200": { description: Claim results }
  /api/reviews/{slug}/versions/{versionId}:
    get:
      summary: Retrieve one immutable review version and its exact snapshot/evidence
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Version-scoped review detail with complete relation-scoped assessment sets
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicReviewDetail" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/diff:
    get:
      summary: Deterministic canonical diff of two readable archived versions
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: from, in: query, required: true, schema: { type: string } }
        - { name: to, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: Checksummed changes across assets, metadata, claims and citations
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/comments:
    get:
      summary: List read-only comments bound to one immutable review version
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Version-scoped threaded comment list }
        "404": { $ref: "#/components/responses/Error" }
  /api/reviews/{slug}/versions/{versionId}/challenges:
    get:
      summary: List integrity-valid formal challenges bound to one immutable review version
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Formal challenge register; stale/tampered subject bindings fail closed and are omitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeList" }
        "404": { $ref: "#/components/responses/Error" }
    post:
      summary: File an attributed formal challenge against an exact canonical subject
      description: Requires authentication, exact same-origin JSON, bounded body, and rate-limit budget. At most ten open or author-responded challenges may target one canonical subject, and one challenger may have only one such active challenge per subject. Does not mutate the target.
      security: [{ session: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: versionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChallengeCreateRequest" }
      responses:
        "201":
          description: Challenge and initial append-only lifecycle event created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeCreateResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/challenges/{id}/transitions:
    post:
      summary: Append an authorized formal-challenge lifecycle transition
      description: Challengers withdraw; the interim swappable policy grants resolution/dismissal to editors. A bare author-responded transition is rejected because response creation owns that atomic transition. Resolution rationale is editorial-only. Scientific-truth verdicts are not represented.
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChallengeTransitionRequest" }
      responses:
        "200":
          description: Transition appended and current challenge revision advanced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeTransitionResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /api/challenges/{id}/responses:
    post:
      summary: Create the one immutable contributor-of-record response and atomically advance the challenge
      security: [{ session: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChallengeResponseCreateRequest" }
      responses:
        "200":
          description: Response and open-to-author-responded transition recorded atomically
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeResponseCreateResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
